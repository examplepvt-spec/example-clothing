<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#161412">
<title>Checkout — EXAMPLE CLOTHING</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Libre+Caslon+Display&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
:root{
  --ink:#161412;
  --ivory:#f6f3ec;
  --ivory-dim:#eee9dd;
  --brass:#9c7a3c;
  --brass-soft:#c7ab74;
  --oxblood:#5e2430;
  --line:#e2dccb;
  --white:#ffffff;
}

*{ margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
body{ background:var(--ivory); color:var(--ink); font-family:'Inter',sans-serif; padding-bottom:120px; -webkit-font-smoothing:antialiased; }
a{ color:inherit; text-decoration:none; }

.header{
  background:rgba(246,243,236,.95);
  backdrop-filter:blur(10px);
  padding:0 18px;
  height:64px;
  display:flex;
  align-items:center;
  border-bottom:1px solid var(--line);
  position:sticky;
  top:0;
  z-index:100;
}

.back-btn{ width:40px; height:40px; display:flex; align-items:center; justify-content:center; border-radius:50%; transition:.3s; }
.back-btn:hover{ background:var(--ivory-dim); }
.back-btn svg{ width:19px; height:19px; stroke:var(--ink); fill:none; stroke-width:1.8; }

.header-title{ font-family:'Libre Caslon Display',serif; font-size:20px; flex:1; text-align:center; margin-right:40px; }

.container{ padding:16px; max-width:600px; margin:0 auto; }

.section-title{ font-size:13px; font-weight:700; text-transform:uppercase; letter-spacing:2px; margin-bottom:12px; margin-top:28px; color:var(--ink); opacity:.7; }

.card { background:var(--white); border:1px solid var(--line); border-radius:12px; padding:18px; margin-bottom:16px; }

.address-display p { font-size:14px; line-height:1.6; color:#555; }
.address-display .name { font-weight:700; font-size:16px; color:var(--ink); margin-bottom:6px; }
.address-display .phone { font-weight:600; color:var(--brass); margin-bottom:4px; font-size:14px; }

.checkout-item { display:flex; align-items:center; gap:14px; padding:12px 0; border-bottom:1px solid var(--ivory-dim); }
.checkout-item:last-child { border-bottom:none; }

.item-thumb { width:56px; height:70px; object-fit:cover; border-radius:6px; background:var(--ivory-dim); flex-shrink:0; }
.item-info { flex:1; min-width:0; }
.item-name { font-size:14px; font-weight:600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; color:var(--ink); }
.item-meta { font-size:12px; color:#888; margin-top:3px; }
.item-price { font-size:15px; font-weight:700; font-family:'Libre Caslon Display',serif; color:var(--ink); flex-shrink:0; }

.summary-row { display:flex; justify-content:space-between; font-size:14px; margin-bottom:12px; color:#555; }
.summary-row.total-row { border-top:1px dashed var(--line); padding-top:14px; margin-top:14px; font-weight:700; font-size:17px; color:var(--ink); }

.free-delivery-badge { font-size:11px; background:#e2f0d9; color:#385723; padding:5px 12px; border-radius:100px; display:inline-block; margin-top:6px; font-weight:600; }
.delivery-warning { font-size:12px; color:var(--oxblood); margin-top:6px; font-weight:500; }

.bottom-bar{ position:fixed; left:0; right:0; bottom:0; background:var(--white); padding:14px 16px; box-shadow:0 -4px 20px rgba(0,0,0,.1); display:flex; justify-content:space-between; align-items:center; border-top:1px solid var(--line); z-index:90; }
.total-box h3{ font-size:11px; color:#888; text-transform:uppercase; letter-spacing:2px; font-weight:600; margin-bottom:3px; }
.total-box h2{ font-family:'Libre Caslon Display',serif; font-size:26px; color:var(--ink); }

.place-order-btn{ background:var(--ink); color:var(--ivory); padding:16px 32px; border-radius:8px; font-size:15px; font-weight:700; letter-spacing:.5px; border:none; cursor:pointer; transition:.3s; }
.place-order-btn:hover{ background:var(--brass); }

.toast{ position:fixed; bottom:100px; left:50%; transform:translateX(-50%) translateY(20px); background:var(--ink); color:white; padding:14px 28px; border-radius:100px; font-size:14px; font-weight:500; z-index:10000; opacity:0; pointer-events:none; transition:.4s; white-space:nowrap; }
.toast.show{ opacity:1; transform:translateX(-50%) translateY(0); }
</style>
</head>

<body>

<div class="header">
  <a href="cart.html" class="back-btn" aria-label="Back to cart">
    <svg viewBox="0 0 24 24"><path d="M19 12H5" stroke-linecap="round"/><path d="M11 18l-6-6 6-6" stroke-linecap="round" stroke-linejoin="round"/></svg>
  </a>
  <span class="header-title">Checkout</span>
</div>

<div class="container">

  <div class="section-title">Delivery Address</div>
  <div class="card">
    <div id="addressDisplay" class="address-display">
      <p style="color:#888;">Loading address...</p>
    </div>
  </div>

  <div class="section-title">Review Items</div>
  <div class="card" id="itemsSummary"></div>

  <div class="section-title">Price Details</div>
  <div class="card">
    <div class="summary-row">
      <span>Subtotal</span>
      <span id="subtotalPrice">₹0</span>
    </div>
    <div class="summary-row">
      <span>Delivery Charge</span>
      <span id="deliveryCharge">₹0</span>
    </div>
    <div id="freeDeliveryNotice" style="text-align:right;"></div>
    <div class="summary-row total-row">
      <span>Total Amount</span>
      <span id="totalPrice">₹0</span>
    </div>
  </div>

</div>

<div class="bottom-bar">
  <div class="total-box">
    <h3>Total</h3>
    <h2 id="bottomTotal">₹0</h2>
  </div>
  <button class="place-order-btn" id="placeOrderBtn" onclick="proceedToPayment()">Proceed to Payment →</button>
</div>

<div class="toast" id="toast"></div>

<script type="module">
import { app, auth, db } from "./firebase.js";
import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { collection, getDocs, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const fallbackAddress = {
  fullName: "Guest User",
  phone: "+91 9656003555",
  addressLine1: "123 Sample Street",
  addressLine2: "Near City Center",
  city: "Calicut",
  state: "Kerala",
  zipCode: "673001"
};

let cart = JSON.parse(localStorage.getItem("cart")) || [];
let userAddress = null;
let currentSubtotal = 0;
let currentDeliveryCharge = 0;
let currentTotal = 0;

const itemsContainer = document.getElementById("itemsSummary");
const subtotalPriceEl = document.getElementById("subtotalPrice");
const deliveryChargeEl = document.getElementById("deliveryCharge");
const freeDeliveryNoticeEl = document.getElementById("freeDeliveryNotice");
const totalPriceEl = document.getElementById("totalPrice");
const bottomTotalEl = document.getElementById("bottomTotal");
const addressDisplay = document.getElementById("addressDisplay");

if (cart.length === 0) {
  showToast("Your cart is empty. Redirecting...");
  setTimeout(() => { window.location.href = "cart.html"; }, 1500);
} else {
  renderSummary();
}

onAuthStateChanged(auth, async (user) => {
  if (user) {
    try {
      const addressesRef = collection(db, "customers", user.uid, "addresses");
      const snap = await getDocs(addressesRef);
      
      let addresses = [];
      snap.forEach(d => addresses.push({ id: d.id, ...d.data() }));

      if (addresses.length > 0) {
        userAddress = addresses.find(a => a.isDefault === true) || addresses[0];
      } else {
        const customerSnap = await getDoc(doc(db, "customers", user.uid));
        const custData = customerSnap.exists() ? customerSnap.data() : {};
        userAddress = {
          fullName: custData.name || user.displayName || "Valued Customer",
          phone: custData.phone || user.phoneNumber || "+91 9656003555",
          addressLine1: "Please add an address",
          addressLine2: "",
          city: "Calicut",
          state: "Kerala",
          zipCode: ""
        };
      }
    } catch (e) {
      console.error(e);
      userAddress = fallbackAddress;
    }
  } else {
    userAddress = fallbackAddress;
  }
  displayAddress();
});

function displayAddress() {
  if (!userAddress) return;
  const name = userAddress.fullName || "Guest User";
  const phone = userAddress.phone || "";
  const line1 = userAddress.addressLine1 || "";
  const line2 = userAddress.addressLine2 ? ", " + userAddress.addressLine2 : "";
  const city = userAddress.city || "";
  const state = userAddress.state ? ", " + userAddress.state : "";
  const zip = userAddress.zipCode ? " — " + userAddress.zipCode : "";

  addressDisplay.innerHTML = `
    <p class="name">${escapeHtml(name)}</p>
    <p class="phone">${escapeHtml(phone)}</p>
    <p>${escapeHtml(line1)}${escapeHtml(line2)}</p>
    <p>${escapeHtml(city)}${escapeHtml(state)}${escapeHtml(zip)}</p>
    <a href="saved-addresses.html" style="display:inline-block; margin-top:10px; font-size:12px; font-weight:600; color:var(--brass); text-decoration:underline;">Change or Add Address</a>
  `;
}

function escapeHtml(str) {
  const div = document.createElement("div");
  div.innerText = str || "";
  return div.innerHTML;
}

function renderSummary() {
  itemsContainer.innerHTML = "";
  currentSubtotal = 0;

  cart.forEach(item => {
    const qty = item.qty || 1;
    const unitPrice = Number(item.offerPrice || item.price) || 0;
    const lineTotal = unitPrice * qty;
    currentSubtotal += lineTotal;

    const div = document.createElement("div");
    div.className = "checkout-item";
    div.innerHTML = `
      <img src="${item.image || ""}" class="item-thumb" alt="${escapeHtml(item.name || "Item")}" onerror="this.style.visibility='hidden';">
      <div class="item-info">
        <div class="item-name">${escapeHtml(item.name || "Product")}</div>
        <div class="item-meta">Qty: ${qty}${item.size ? " | Size: " + escapeHtml(item.size) : ""}</div>
      </div>
      <div class="item-price">₹${lineTotal}</div>
    `;
    itemsContainer.appendChild(div);
  });

  const deliveryThreshold = 3500;
  currentDeliveryCharge = currentSubtotal >= deliveryThreshold ? 0 : 100;

  if (currentDeliveryCharge === 0) {
    freeDeliveryNoticeEl.innerHTML = `<span class="free-delivery-badge">Free Delivery Applied! 🎉</span>`;
  } else {
    const balance = deliveryThreshold - currentSubtotal;
    freeDeliveryNoticeEl.innerHTML = `<span class="delivery-warning">Add ₹${balance} more to get FREE Delivery</span>`;
  }

  currentTotal = currentSubtotal + currentDeliveryCharge;
  subtotalPriceEl.innerText = "₹" + currentSubtotal;
  deliveryChargeEl.innerText = currentDeliveryCharge === 0 ? "FREE" : "₹" + currentDeliveryCharge;
  totalPriceEl.innerText = "₹" + currentTotal;
  bottomTotalEl.innerText = "₹" + currentTotal;
}

window.proceedToPayment = function() {
  if (cart.length === 0) {
    showToast("Your cart is empty");
    return;
  }
  if (!userAddress || !userAddress.addressLine1) {
    showToast("Please select a valid delivery address.");
    return;
  }

  // Save checkout data for payment.html
  const checkoutData = {
    address: userAddress,
    cart: cart,
    subtotal: currentSubtotal,
    deliveryCharge: currentDeliveryCharge,
    totalPrice: currentTotal
  };
  localStorage.setItem("checkoutData", JSON.stringify(checkoutData));

  // Redirect to payment.html
  window.location.href = "payment.html";
};

function showToast(text) {
  const toast = document.getElementById("toast");
  toast.textContent = text;
  toast.classList.add("show");
  setTimeout(() => toast.classList.remove("show"), 2500);
}
</script>

</body>
</html>
