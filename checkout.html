<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#161412">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Checkout — EXAMPLE CLOTHING</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Libre+Caslon+Display&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
:root{
  --ink:#161412;
  --ivory:#f6f3ec;
  --ivory-dim:#eee9dd;
  --brass:#9c7a3c;
  --brass-soft:#c7ab74;
  --oxblood:#5e2430;
  --line:#e2dccb;
  --white:#ffffff;
  --gold:#b08d3e;
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  -webkit-tap-highlight-color:transparent;
}

html{
  touch-action:pan-y;
  overscroll-behavior-y:none;
}

body{
  background:var(--ivory);
  color:var(--ink);
  font-family:'Inter',sans-serif;
  padding-bottom:120px;
  -webkit-font-smoothing:antialiased;
  -moz-osx-font-smoothing:grayscale;
}

a{ color:inherit; text-decoration:none; }

/*==========================
HEADER
==========================*/

.header{
  background:rgba(246,243,236,.95);
  backdrop-filter:blur(10px);
  -webkit-backdrop-filter:blur(10px);
  padding:0 18px;
  height:64px;
  display:flex;
  align-items:center;
  border-bottom:1px solid var(--line);
  position:sticky;
  top:0;
  z-index:100;
}

.back-btn{
  width:40px;
  height:40px;
  display:flex;
  align-items:center;
  justify-content:center;
  border-radius:50%;
  transition:.3s;
}

.back-btn:hover,
.back-btn:active{
  background:var(--ivory-dim);
}

.back-btn svg{
  width:19px;
  height:19px;
  stroke:var(--ink);
  fill:none;
  stroke-width:1.8;
}

.header-title{
  font-family:'Libre Caslon Display',serif;
  font-size:20px;
  flex:1;
  text-align:center;
  margin-right:40px;
}

/*==========================
CONTAINER
==========================*/

.container{
  padding:16px;
  max-width:600px;
  margin:0 auto;
}

.section-title{
  font-size:13px;
  font-weight:700;
  text-transform:uppercase;
  letter-spacing:2px;
  margin-bottom:12px;
  margin-top:28px;
  color:var(--ink);
  opacity:.7;
}

/*==========================
ADDRESS CARD
==========================*/

.card {
  background:var(--white);
  border:1px solid var(--line);
  border-radius:12px;
  padding:18px;
  margin-bottom:16px;
  transition:.3s;
}

.card:hover{
  box-shadow:0 4px 16px rgba(0,0,0,.06);
}

.address-display p {
  font-size:14px;
  line-height:1.6;
  color:#555;
}

.address-display .name {
  font-weight:700;
  font-size:16px;
  color:var(--ink);
  margin-bottom:6px;
}

.address-display .phone {
  font-weight:600;
  color:var(--brass);
  margin-bottom:4px;
  font-size:14px;
}

.change-btn {
  background:none;
  border:none;
  color:var(--brass);
  font-size:13px;
  font-weight:600;
  cursor:pointer;
  margin-top:14px;
  padding:0;
  text-decoration:underline;
  text-underline-offset:3px;
  transition:.3s;
}

.change-btn:hover,
.change-btn:active{
  color:var(--ink);
}

.no-address{
  text-align:center;
  padding:20px 0;
}

.no-address p{
  color:var(--oxblood);
  font-weight:600;
  font-size:14px;
  margin-bottom:16px;
}

.add-address-btn{
  display:inline-block;
  background:var(--ink);
  color:var(--ivory);
  padding:10px 24px;
  border-radius:6px;
  font-size:13px;
  font-weight:600;
  border:none;
  cursor:pointer;
  transition:.3s;
}

.add-address-btn:hover,
.add-address-btn:active{
  background:var(--brass);
}

/*==========================
CART ITEMS
==========================*/

.checkout-item {
  display:flex;
  align-items:center;
  gap:14px;
  padding:12px 0;
  border-bottom:1px solid var(--ivory-dim);
}

.checkout-item:last-child {
  border-bottom:none;
}

.item-thumb {
  width:56px;
  height:70px;
  object-fit:cover;
  border-radius:6px;
  background:var(--ivory-dim);
  flex-shrink:0;
}

.item-info {
  flex:1;
  min-width:0;
}

.item-name {
  font-size:14px;
  font-weight:600;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
  color:var(--ink);
}

.item-meta {
  font-size:12px;
  color:#888;
  margin-top:3px;
}

.item-price {
  font-size:15px;
  font-weight:700;
  font-family:'Libre Caslon Display',serif;
  color:var(--ink);
  flex-shrink:0;
}

/*==========================
PAYMENT METHOD
==========================*/

.payment-option {
  display:flex;
  align-items:center;
  gap:14px;
  padding:16px;
  border:1px solid var(--line);
  border-radius:10px;
  margin-bottom:10px;
  cursor:pointer;
  background:var(--white);
  transition:.3s;
}

.payment-option:hover,
.payment-option:active{
  border-color:var(--brass-soft);
  box-shadow:0 2px 10px rgba(0,0,0,.05);
}

.payment-option input[type="radio"] {
  accent-color:var(--ink);
  width:20px;
  height:20px;
  flex-shrink:0;
  cursor:pointer;
}

.payment-label {
  font-size:14px;
  font-weight:600;
  color:var(--ink);
}

.payment-desc{
  font-size:12px;
  color:#888;
  margin-top:2px;
}

/*==========================
PRICE SUMMARY
==========================*/

.summary-row {
  display:flex;
  justify-content:space-between;
  font-size:14px;
  margin-bottom:12px;
  color:#555;
}

.summary-row.total-row {
  border-top:1px dashed var(--line);
  padding-top:14px;
  margin-top:14px;
  font-weight:700;
  font-size:17px;
  color:var(--ink);
}

.free-delivery-badge {
  font-size:11px;
  background:#e2f0d9;
  color:#385723;
  padding:5px 12px;
  border-radius:100px;
  display:inline-block;
  margin-top:6px;
  font-weight:600;
}

.delivery-warning {
  font-size:12px;
  color:var(--oxblood);
  margin-top:6px;
  font-weight:500;
}

/*==========================
BOTTOM BAR
==========================*/

.bottom-bar{
  position:fixed;
  left:0;
  right:0;
  bottom:0;
  background:var(--white);
  padding:14px 16px;
  box-shadow:0 -4px 20px rgba(0,0,0,.1);
  display:flex;
  justify-content:space-between;
  align-items:center;
  border-top:1px solid var(--line);
  z-index:90;
}

.total-box h3{
  font-size:11px;
  color:#888;
  text-transform:uppercase;
  letter-spacing:2px;
  font-weight:600;
  margin-bottom:3px;
}

.total-box h2{
  font-family:'Libre Caslon Display',serif;
  font-size:26px;
  color:var(--ink);
}

.place-order-btn{
  background:var(--ink);
  color:var(--ivory);
  padding:16px 32px;
  border-radius:8px;
  font-size:15px;
  font-weight:700;
  letter-spacing:.5px;
  border:none;
  cursor:pointer;
  transition:.3s;
  position:relative;
  overflow:hidden;
}

.place-order-btn::after{
  content:"";
  position:absolute;
  inset:0;
  background:rgba(255,255,255,.1);
  transform:translateY(100%);
  transition:.3s;
}

.place-order-btn:hover::after,
.place-order-btn:active::after{
  transform:translateY(0);
}

.place-order-btn:hover,
.place-order-btn:active{
  transform:translateY(-1px);
  box-shadow:0 6px 20px rgba(0,0,0,.2);
}

.place-order-btn:disabled{
  opacity:.5;
  cursor:not-allowed;
  transform:none;
}

/*==========================
SUCCESS MODAL
==========================*/

.modal-overlay {
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.6);
  backdrop-filter:blur(8px);
  -webkit-backdrop-filter:blur(8px);
  z-index:200;
  display:none;
  align-items:center;
  justify-content:center;
  padding:20px;
  opacity:0;
  transition:opacity .4s;
}

.modal-overlay.show{
  opacity:1;
}

.success-modal {
  background:var(--ivory);
  border:1px solid var(--line);
  border-radius:16px;
  padding:36px 28px;
  max-width:400px;
  width:100%;
  text-align:center;
  box-shadow:0 20px 50px rgba(0,0,0,.2);
  transform:scale(.9);
  transition:transform .4s;
}

.modal-overlay.show .success-modal{
  transform:scale(1);
}

.success-icon {
  width:72px;
  height:72px;
  background:#e2f0d9;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  margin:0 auto 20px;
  animation:successPop .5s var(--ease);
}

@keyframes successPop{
  0%{ transform:scale(0); }
  60%{ transform:scale(1.1); }
  100%{ transform:scale(1); }
}

.success-icon svg {
  width:36px;
  height:36px;
  stroke:#385723;
  fill:none;
  stroke-width:2.5;
}

.success-modal h2 {
  font-family:'Libre Caslon Display',serif;
  font-size:26px;
  margin-bottom:10px;
  color:var(--ink);
}

.success-modal p {
  font-size:14px;
  color:#666;
  line-height:1.7;
  margin-bottom:28px;
}

.home-btn {
  display:inline-block;
  background:var(--ink);
  color:var(--ivory);
  padding:14px 32px;
  border-radius:8px;
  font-weight:600;
  font-size:14px;
  transition:.3s;
  border:none;
  cursor:pointer;
}

.home-btn:hover,
.home-btn:active{
  background:var(--brass);
  transform:translateY(-2px);
}

/*==========================
TOAST
==========================*/

.toast{
  position:fixed;
  bottom:100px;
  left:50%;
  transform:translateX(-50%) translateY(20px);
  background:var(--ink);
  color:white;
  padding:14px 28px;
  border-radius:100px;
  font-size:14px;
  font-weight:500;
  z-index:10000;
  opacity:0;
  pointer-events:none;
  transition:.4s;
  white-space:nowrap;
  box-shadow:0 8px 30px rgba(0,0,0,.2);
}

.toast.show{
  opacity:1;
  transform:translateX(-50%) translateY(0);
}

/*==========================
SKELETON LOADING
==========================*/

.skeleton{
  background:linear-gradient(90deg, #eee 25%, #f5f5f5 50%, #eee 75%);
  background-size:200% 100%;
  animation:skeleton 1.5s infinite;
  border-radius:4px;
}

@keyframes skeleton{
  0%{ background-position:200% 0; }
  100%{ background-position:-200% 0; }
}

.skeleton-text{
  height:14px;
  margin-bottom:8px;
}

.skeleton-text.short{
  width:60%;
}

/*==========================
RESPONSIVE
==========================*/

@media(max-width:480px){
  .container{
    padding:12px;
  }
  .place-order-btn{
    padding:14px 24px;
    font-size:14px;
  }
  .total-box h2{
    font-size:22px;
  }
}

@media(prefers-reduced-motion:reduce){
  *,*::before,*::after{
    animation-duration:0.01ms !important;
    transition-duration:0.01ms !important;
  }
}

</style>

<body>

<!-- HEADER -->
<div class="header">
  <a href="cart.html" class="back-btn" aria-label="Back to cart">
    <svg viewBox="0 0 24 24"><path d="M19 12H5" stroke-linecap="round"/><path d="M11 18l-6-6 6-6" stroke-linecap="round" stroke-linejoin="round"/></svg>
  </a>
  <span class="header-title">Checkout</span>
</div>

<div class="container">

  <!-- Delivery Address Section -->
  <div class="section-title">Delivery Address</div>
  <div class="card" id="addressCard">
    <div id="addressDisplay" class="address-display">
      <div class="skeleton skeleton-text" style="width:120px; height:18px;"></div>
      <div class="skeleton skeleton-text short"></div>
      <div class="skeleton skeleton-text"></div>
      <div class="skeleton skeleton-text short" style="width:100px;"></div>
    </div>
  </div>

  <!-- Cart Items Review Section -->
  <div class="section-title">Review Items</div>
  <div class="card" id="itemsSummary">
    <!-- Cart Items will be inserted here dynamically -->
  </div>

  <!-- Payment Method Section -->
  <div class="section-title">Payment Method</div>
  <div>
    <label class="payment-option">
      <input type="radio" name="payment" value="UPI" checked>
      <div>
        <div class="payment-label">UPI (Google Pay / PhonePe)</div>
        <div class="payment-desc">Pay securely using any UPI app</div>
      </div>
    </label>

  </div>

  <!-- Price Summary Section -->
  <div class="section-title">Price Details</div>
  <div class="card">
    <div class="summary-row">
      <span>Subtotal</span>
      <span id="subtotalPrice">₹0</span>
    </div>
    <div class="summary-row">
      <span>Delivery Charge</span>
      <span id="deliveryCharge">₹0</span>
    </div>
    <div id="freeDeliveryNotice" style="text-align:right;">
      <!-- Free delivery message or warning will show here -->
    </div>
    <div class="summary-row total-row">
      <span>Total Amount</span>
      <span id="totalPrice" style="font-family:'Libre Caslon Display',serif; font-size:20px; font-weight:700;">₹0</span>
    </div>
  </div>

</div>

<!-- Bottom bar for Quick Place Order -->
<div class="bottom-bar">
  <div class="total-box">
    <h3>Total</h3>
    <h2 id="bottomTotal">₹0</h2>
  </div>
  <button class="place-order-btn" id="placeOrderBtn" onclick="placeOrder()">Place Order</button>
</div>

<!-- Order Success Modal Overlay -->
<div class="modal-overlay" id="successOverlay">
  <div class="success-modal">
    <div class="success-icon">
      <svg viewBox="0 0 24 24">
        <path d="M20 6L9 17l-5-5" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>
    <h2>Order Placed!</h2>
    <p>Thank you for shopping with us. Your order details and tracking link have been sent to your registered contact number.</p>
    <a href="categories.html" class="home-btn" onclick="clearCart()">Continue Shopping</a>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>

/*==========================
FIREBASE CONFIG (INLINE)
==========================*/
const firebaseConfig = {
  apiKey: "AIzaSyB-EXAMPLE-KEY",
  authDomain: "example-clothing.firebaseapp.com",
  projectId: "example-clothing",
  storageBucket: "example-clothing.appspot.com",
  messagingSenderId: "123456789",
  appId: "1:123456789:web:abcdef123456"
};

/*==========================
FALLBACK ADDRESS DATA
==========================*/
const fallbackAddresses = [
  {
    fullName: "Guest User",
    phone: "+91 9656003555",
    addressLine1: "123 Sample Street",
    addressLine2: "Near City Center",
    city: "Calicut",
    state: "Kerala",
    zipCode: "673001",
    isDefault: true
  }
];

/*==========================
STATE
==========================*/
let cart = JSON.parse(localStorage.getItem("cart")) || [];
let userAddress = null;
let firebaseLoaded = false;

const itemsContainer = document.getElementById("itemsSummary");
const subtotalPriceEl = document.getElementById("subtotalPrice");
const deliveryChargeEl = document.getElementById("deliveryCharge");
const freeDeliveryNoticeEl = document.getElementById("freeDeliveryNotice");
const totalPriceEl = document.getElementById("totalPrice");
const bottomTotalEl = document.getElementById("bottomTotal");
const placeOrderBtn = document.getElementById("placeOrderBtn");
const successOverlay = document.getElementById("successOverlay");
const addressDisplay = document.getElementById("addressDisplay");

/*==========================
INIT
==========================*/

// Check cart first
if (cart.length === 0) {
  showToast("Your cart is empty. Redirecting...");
  setTimeout(() => { window.location.href = "cart.html"; }, 1500);
} else {
  renderSummary();
  loadAddress();
}

/*==========================
ADDRESS LOADING
==========================*/

async function loadAddress() {
  // Try to load from localStorage first (for offline/no-firebase use)
  const savedAddress = localStorage.getItem("defaultAddress");
  if (savedAddress) {
    try {
      userAddress = JSON.parse(savedAddress);
      displayAddress();
      return;
    } catch(e) {
      console.log("Saved address parse error, trying Firebase...");
    }
  }

  // Try Firebase if available
  try {
    if (typeof firebase !== 'undefined' && firebase.apps && firebase.apps.length > 0) {
      const auth = firebase.auth();
      const db = firebase.firestore();

      auth.onAuthStateChanged(async (user) => {
        if (user) {
          const addrRef = db.collection("customers").doc(user.uid).collection("addresses");
          const snapshot = await addrRef.get();

          let defaultAddr = null;
          snapshot.forEach((doc) => {
            const data = doc.data();
            if (data.isDefault === true) {
              defaultAddr = data;
            }
          });

          if (defaultAddr) {
            userAddress = defaultAddr;
            localStorage.setItem("defaultAddress", JSON.stringify(defaultAddr));
            displayAddress();
          } else {
            showNoAddress();
          }
        } else {
          // Not logged in - use fallback
          userAddress = fallbackAddresses[0];
          displayAddress();
        }
      });
    } else {
      // Firebase not available - use fallback
      userAddress = fallbackAddresses[0];
      displayAddress();
    }
  } catch (error) {
    console.error("Error loading address:", error);
    userAddress = fallbackAddresses[0];
    displayAddress();
  }
}

function displayAddress() {
  if (!userAddress) return;

  const line1 = userAddress.addressLine1 || "";
  const line2 = userAddress.addressLine2 ? ", " + userAddress.addressLine2 : "";
  const city = userAddress.city ? userAddress.city : "";
  const state = userAddress.state ? ", " + userAddress.state : "";

  addressDisplay.innerHTML = `
    <p class="name">${userAddress.fullName || "Guest User"}</p>
    <p class="phone">${userAddress.phone || ""}</p>
    <p>${line1}${line2}</p>
    <p>${city}${state} — ${userAddress.zipCode || ""}</p>

  `;
}

function showNoAddress() {
  addressDisplay.innerHTML = `
    <div class="no-address">
      <p>No default address found.</p>
      <button class="add-address-btn" id="addAddrBtn">Add Address</button>
    <p style="font-size:12px; color:#888; margin-top:8px;">Please add an address in your profile</p>
  `;

  // Re-attach click handler
  setTimeout(() => {
    const btn = document.getElementById("addAddrBtn");
    if(btn) btn.addEventListener("click", function(){ window.location.href = "addresses.html"; });
  }, 0);
    </div>
  `;
}

/*==========================
CART SUMMARY
==========================*/

function renderSummary() {
  itemsContainer.innerHTML = "";
  let subtotal = 0;

  if (cart.length === 0) {
    itemsContainer.innerHTML = '<p style="text-align:center; color:#888; padding:20px 0;">Your cart is empty</p>';
    updateTotals(0, 0, 0);
    return;
  }

  cart.forEach(item => {
    const qty = item.qty || 1;
    const unitPrice = Number(item.offerPrice || item.price) || 0;
    const lineTotal = unitPrice * qty;
    subtotal += lineTotal;

    const div = document.createElement("div");
    div.className = "checkout-item";
    div.innerHTML = `
      <img src="${item.image || ""}" class="item-thumb" alt="${item.name || "Item"}" onerror="this.style.visibility='hidden'; this.parentElement.querySelector('.item-thumb-fallback').style.display='flex';">
      <div class="item-thumb-fallback" style="display:none; width:56px; height:70px; background:var(--ivory-dim); border-radius:6px; align-items:center; justify-content:center; font-size:10px; color:#aaa; flex-shrink:0;">IMG</div>
      <div class="item-info">
        <div class="item-name">${item.name || "Product"}</div>
        <div class="item-meta">Qty: ${qty}${item.size ? " | Size: " + item.size : ""}</div>
      </div>
      <div class="item-price">₹${lineTotal}</div>
    `;
    itemsContainer.appendChild(div);
  });

  const deliveryThreshold = 3500;
  let deliveryCharge = 100;

  if (subtotal >= deliveryThreshold) {
    deliveryCharge = 0;
    freeDeliveryNoticeEl.innerHTML = `<span class="free-delivery-badge">Free Delivery Applied! 🎉</span>`;
  } else {
    const balanceNeeded = deliveryThreshold - subtotal;
    freeDeliveryNoticeEl.innerHTML = `<span class="delivery-warning">Add ₹${balanceNeeded} more to get FREE Delivery</span>`;
  }

  const finalTotal = subtotal + deliveryCharge;
  updateTotals(subtotal, deliveryCharge, finalTotal);
}

function updateTotals(subtotal, delivery, total) {
  subtotalPriceEl.innerText = "₹" + subtotal;
  deliveryChargeEl.innerText = delivery === 0 ? "FREE" : "₹" + delivery;
  totalPriceEl.innerText = "₹" + total;
  bottomTotalEl.innerText = "₹" + total;
}

/*==========================
PLACE ORDER
==========================*/

function placeOrder() {
  if (cart.length === 0) {
    showToast("Your cart is empty");
    return;
  }

  placeOrderBtn.disabled = true;
  placeOrderBtn.innerText = "Processing...";

  // Simulate order processing
  setTimeout(() => {
    successOverlay.style.display = "flex";
    // Trigger animation
    requestAnimationFrame(() => {
      successOverlay.classList.add("show");
    });
    placeOrderBtn.disabled = false;
    placeOrderBtn.innerText = "Place Order";
  }, 800);
}

function clearCart() {
  localStorage.removeItem("cart");
  cart = [];
}

/*==========================
TOAST
==========================*/

function showToast(text) {
  const toast = document.getElementById("toast");
  toast.textContent = text;
  toast.classList.add("show");
  setTimeout(() => toast.classList.remove("show"), 2500);
}

/*==========================
CLOSE MODAL ON BACKDROP CLICK
==========================*/

successOverlay.addEventListener("click", (e) => {
  if (e.target === successOverlay) {
    successOverlay.classList.remove("show");
    setTimeout(() => { successOverlay.style.display = "none"; }, 400);
  }
});

</script>

<script type="module">
// Only loads if firebase-config.js exists
