<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - EXAMPLE CLOTHING</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f5f5f5;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
padding:20px;
}

.login-box{
width:100%;
max-width:400px;
background:#fff;
padding:30px;
border-radius:18px;
box-shadow:0 4px 20px rgba(0,0,0,.08);
}

h1{
text-align:center;
margin-bottom:10px;
font-size:30px;
}

p{
text-align:center;
color:#666;
margin-bottom:25px;
}

input{
width:100%;
padding:15px;
margin-bottom:15px;
border:1px solid #ddd;
border-radius:12px;
font-size:16px;
}

button{
width:100%;
padding:15px;
border:none;
border-radius:12px;
font-size:17px;
font-weight:bold;
cursor:pointer;
margin-bottom:12px;
}

#loginBtn{
background:#111;
color:#fff;
}

#createBtn{
background:#fff;
color:#111;
border:1px solid #111;
}

.links{
text-align:center;
margin-top:15px;
}

.links a{
text-decoration:none;
color:#111;
font-size:15px;
}
</style>
</head>

<body>

<div class="login-box">

<h1>Login</h1>

<p>Welcome to EXAMPLE CLOTHING</p>

<input
type="email"
id="email"
placeholder="Email Address">

<input
type="password"
id="password"
placeholder="Password">

<button id="loginBtn">
Login
</button>

<button
id="createBtn"
onclick="location.href='register.html'">
Create Account
</button>

<div class="links">

<a href="forgot-password.html">
Forgot Password?
</a>

</div>

</div>

<script type="module">

import { login } from "./auth.js";

document.getElementById("loginBtn").onclick = async () => {

const email = document.getElementById("email").value.trim();
const password = document.getElementById("password").value;

if(!email || !password){
alert("Please enter email and password");
return;
}

try{

await login(email,password);

window.location.href = "index.html";

}
catch(error){

alert(error.message);

}

};

</script>

</body>
</html>
