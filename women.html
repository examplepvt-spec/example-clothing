<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Women Collection — EXAMPLE CLOTHING</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Libre+Caslon+Display&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
:root{
  --ink:#161412;
  --ivory:#f6f3ec;
  --ivory-dim:#eee9dd;
  --brass:#9c7a3c;
  --brass-soft:#c7ab74;
  --line:#e2dccb;
  --white:#ffffff;
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  background:var(--ivory);
  color:var(--ink);
  font-family:'Inter',sans-serif;
  -webkit-font-smoothing:antialiased;
}

h1{
  font-family:'Libre Caslon Display',serif;
  font-weight:400;
}

a{
  color:inherit;
}

/* ---------- HEADER (shared) ---------- */

.header{
  position:sticky;
  top:0;
  width:100%;
  height:68px;
  background:rgba(246,243,236,.95);
  backdrop-filter:blur(10px);
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:0 18px;
  z-index:1000;
  border-bottom:1px solid var(--line);
}

.menu-btn{
  width:24px;
  height:18px;
  display:flex;
  flex-direction:column;
  justify-content:space-between;
  cursor:pointer;
  background:none;
  border:none;
  padding:0;
}

.menu-btn span{
  display:block;
  height:2px;
  background:var(--ink);
  border-radius:2px;
}

.logo-area{
  display:flex;
  align-items:center;
  gap:10px;
  flex:1;
  margin-left:18px;
}

.logo{
  width:34px;
  height:34px;
  border-radius:50%;
  object-fit:cover;
}

.logo-text{
  font-family:'Libre Caslon Display',serif;
  font-size:17px;
  letter-spacing:.3px;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}

.header-icons{
  display:flex;
  align-items:center;
  gap:6px;
}

.icon-link{
  position:relative;
  width:42px;
  height:42px;
  display:flex;
  align-items:center;
  justify-content:center;
  text-decoration:none;
  border-radius:50%;
  transition:background .2s;
}

.icon-link:hover{
  background:var(--ivory-dim);
}

.icon-link svg{
  width:21px;
  height:21px;
  stroke:var(--ink);
  fill:none;
  stroke-width:1.6;
}

.badge{
  position:absolute;
  top:2px;
  right:2px;
  background:var(--brass);
  color:var(--white);
  min-width:16px;
  height:16px;
  padding:0 3px;
  border-radius:50%;
  font-size:10px;
  font-weight:700;
  display:flex;
  align-items:center;
  justify-content:center;
}

/* ---------- SIDE MENU (shared) ---------- */

.side-menu{
  position:fixed;
  top:0;
  left:-300px;
  width:290px;
  height:100%;
  background:var(--ink);
  color:var(--ivory);
  padding:90px 32px 32px;
  transition:.4s cubic-bezier(.4,0,.2,1);
  z-index:2000;
}

.side-menu.open{
  left:0;
}

.menu-tag{
  font-size:11px;
  letter-spacing:2px;
  text-transform:uppercase;
  color:var(--brass-soft);
  margin-bottom:20px;
  display:block;
}

.side-menu a.nav-link{
  display:block;
  text-decoration:none;
  color:var(--ivory);
  font-family:'Libre Caslon Display',serif;
  font-size:22px;
  padding:13px 0;
  border-bottom:1px solid rgba(255,255,255,.1);
}

.close-btn{
  position:absolute;
  top:24px;
  right:24px;
  background:none;
  border:none;
  color:var(--ivory);
  font-size:26px;
  cursor:pointer;
  line-height:1;
}

.menu-overlay{
  display:none;
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,.4);
  z-index:1500;
}

.menu-overlay.open{
  display:block;
}

/* ---------- PAGE HEAD ---------- */

.page-head{
  padding:28px 22px 20px;
}

.eyebrow-dark{
  font-size:11px;
  letter-spacing:2px;
  text-transform:uppercase;
  color:var(--brass);
  font-weight:700;
}

.page-head h1{
  font-size:28px;
  margin-top:6px;
}

/* ---------- CATEGORY GRID ---------- */

.grid{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:14px;
  padding:0 22px 40px;
}

.cat{
  background:var(--white);
  border:1px solid var(--line);
  border-radius:6px;
  padding:35px 12px;
  text-align:center;
  text-decoration:none;
  color:var(--ink);
  font-family:'Libre Caslon Display',serif;
  font-size:18px;
  letter-spacing:1px;
  transition:background .2s, border-color .2s;
  display:flex;
  align-items:center;
  justify-content:center;
  min-height:110px;
}

.cat:hover{
  background:var(--ivory-dim);
  border-color:var(--brass-soft);
}

/* ---------- BACK LINK ---------- */

.back{
  display:flex;
  align-items:center;
  gap:8px;
  justify-content:center;
  padding:6px 22px 40px;
  text-decoration:none;
  font-weight:600;
  font-size:14px;
  color:var(--ink);
}

.back svg{
  width:16px;
  height:16px;
  stroke:var(--ink);
  fill:none;
  stroke-width:2;
}
</style>
</head>

<body>

<div class="menu-overlay" id="menuOverlay"></div>

<div class="header">

  <button class="menu-btn" id="menuBtn" aria-label="Open menu">
    <span></span><span></span><span></span>
  </button>

  <div class="logo-area">
    <img src="logo.png" class="logo" alt="EXAMPLE CLOTHING">
    <span class="logo-text">EXAMPLE CLOTHING</span>
  </div>

  <div class="header-icons">

    <a href="login.html" id="accountBtn" class="icon-link" aria-label="Account">
      <svg viewBox="0 0 24 24"><path d="M12 12a4.5 4.5 0 1 0 0-9 4.5 4.5 0 0 0 0 9Z"/><path d="M4.5 20.5c1.4-3.6 4.3-5.5 7.5-5.5s6.1 1.9 7.5 5.5"/></svg>
    </a>

    <a href="wishlist.html" class="icon-link" aria-label="Wishlist">
      <svg viewBox="0 0 24 24"><path d="M12 20.2s-7.6-4.5-9.9-9C.6 8 2 4.5 5.4 3.7c2-.5 3.9.3 5 2 .3.4.5.9.6 1.3.1-.4.3-.9.6-1.3 1.1-1.7 3-2.5 5-2 3.4.8 4.8 4.3 3.3 7.5-2.3 4.5-9.9 9-9.9 9Z"/></svg>
    </a>

    <a href="cart.html" class="icon-link" aria-label="Cart">
      <svg viewBox="0 0 24 24"><path d="M4 7h16l-1.4 10.3a2 2 0 0 1-2 1.7H7.4a2 2 0 0 1-2-1.7L4 7Z"/><path d="M8 10V6a4 4 0 0 1 8 0v4"/></svg>
      <span class="badge" id="cartCount">0</span>
    </a>

  </div>

</div>

<div class="side-menu" id="menu">
  <button class="close-btn" id="closeMenuBtn" aria-label="Close menu">✕</button>
  <span class="menu-tag">Browse</span>
  <a href="men.html" class="nav-link">Men</a>
  <a href="women.html" class="nav-link">Women</a>
  <a href="kids.html" class="nav-link">Kids</a>
  <a href="sale.html" class="nav-link">Sale</a>
  <a href="accessories.html" class="nav-link">Accessories</a>
  <a href="footwear.html" class="nav-link">Footwear</a>
  <a href="login.html" class="nav-link" id="menuLoginLink">Login</a>
</div>

<div class="page-head">
  <span class="eyebrow-dark">Browse</span>
  <h1>Women Collection</h1>
</div>

<div class="grid">

  <a href="women-jackets.html" class="cat">
    JACKETS
  </a>

  <a href="women-jeans.html" class="cat">
    JEANS
  </a>

  <a href="women-tshirt.html" class="cat">
    T-SHIRTS
  </a>

</div>

<a href="categories.html" class="back">
  <svg viewBox="0 0 24 24"><path d="M19 12H5"/><path d="M11 18l-6-6 6-6"/></svg>
  Back to Categories
</a>

<script type="module">

const menu = document.getElementById("menu");
const overlay = document.getElementById("menuOverlay");

function openMenu(){
    menu.classList.add("open");
    overlay.classList.add("open");
}

function closeMenu(){
    menu.classList.remove("open");
    overlay.classList.remove("open");
}

document.getElementById("menuBtn").addEventListener("click", openMenu);
document.getElementById("closeMenuBtn").addEventListener("click", closeMenu);
overlay.addEventListener("click", closeMenu);

let cart = JSON.parse(localStorage.getItem("cart")) || [];
let totalQty = 0;
cart.forEach(item => { totalQty += item.qty || 1; });
document.getElementById("cartCount").innerText = totalQty;

import("./auth.js").then(({ checkUser }) => {
    checkUser((user) => {
        const accountBtn = document.getElementById("accountBtn");
        const menuLoginLink = document.getElementById("menuLoginLink");
        if(user){
            accountBtn.href = "profile.html";
            if(menuLoginLink) menuLoginLink.style.display = "none";
        }
    });
});

</script>

</body>
</html>
