<style>

:root{

--ink:#0e0d0b;
--ink-soft:#191715;

--ivory:#f7f4ee;
--ivory-soft:#f2eee6;

--gold:#b08d3e;
--gold-light:#d8bf83;

--line:#e4ddcd;

--white:#fff;

--ease:cubic-bezier(.22,1,.36,1);

}

*{

margin:0;
padding:0;
box-sizing:border-box;

}

html{

scroll-behavior:smooth;

}

body{

background:var(--ivory);
color:var(--ink);

font-family:Inter,sans-serif;

overflow-x:hidden;

-webkit-font-smoothing:antialiased;

}

img{

display:block;
max-width:100%;

}

a{

text-decoration:none;
color:inherit;

}

h1,h2,h3{

font-family:"Cormorant Garamond",serif;
font-weight:500;

}

/*==========================
PRELOADER
==========================*/

.preloader{

position:fixed;
inset:0;

background:var(--ink);

display:flex;

align-items:center;
justify-content:center;

flex-direction:column;

z-index:99999;

transition:.8s;

}

.preloader.hide{

opacity:0;
visibility:hidden;

}

.loaderLogo{

font-family:"Cormorant Garamond",serif;

font-size:36px;

letter-spacing:8px;

color:white;

margin-bottom:15px;

}

.loaderLine{

width:120px;
height:2px;

background:rgba(255,255,255,.15);

overflow:hidden;

}

.loaderLine span{

display:block;

height:100%;
width:0;

background:var(--gold);

animation:loading 2s forwards;

}

@keyframes loading{

100%{

width:100%;

}

}

/*==========================
HEADER
==========================*/

.header{

position:fixed;

top:0;
left:0;

width:100%;

height:72px;

display:flex;

align-items:center;

justify-content:space-between;

padding:0 20px;

z-index:5000;

transition:.45s;

background:transparent;

}

.header.active{

background:rgba(247,244,238,.94);

backdrop-filter:blur(18px);

border-bottom:1px solid var(--line);

}

.menu-btn{

width:44px;
height:44px;

display:flex;

flex-direction:column;

justify-content:center;

gap:6px;

cursor:pointer;

background:none;

border:none;

}

.menu-btn span{

display:block;

height:2px;

background:white;

transition:.35s;

}

.header.active .menu-btn span{

background:var(--ink);

}

.menu-btn span:nth-child(1){

width:24px;

}

.menu-btn span:nth-child(2){

width:17px;

}

.menu-btn span:nth-child(3){

width:21px;

}

.logoArea{

display:flex;

align-items:center;

gap:12px;

flex:1;

margin-left:14px;

}

.logo{

width:36px;
height:36px;

border-radius:50%;

object-fit:cover;

}

.logoText{

font-family:"Cormorant Garamond",serif;

font-size:22px;

letter-spacing:4px;

color:white;

transition:.35s;

}

.header.active .logoText{

color:var(--ink);

}

.headerIcons{

display:flex;

gap:6px;

}

.icon{

position:relative;

width:42px;
height:42px;

display:flex;

align-items:center;

justify-content:center;

border-radius:50%;

transition:.3s;

}

.icon:hover{

background:rgba(176,141,62,.12);

}

.icon svg{

width:21px;
height:21px;

stroke:white;

fill:none;

stroke-width:1.5;

transition:.35s;

}

.header.active .icon svg{

stroke:var(--ink);

}

.badge{

position:absolute;

top:2px;
right:2px;

background:var(--gold);

color:white;

font-size:10px;

font-weight:700;

min-width:16px;
height:16px;

display:flex;

align-items:center;

justify-content:center;

border-radius:50%;

}

/*==========================
SIDE MENU
==========================*/

.overlayMenu{

position:fixed;

inset:0;

background:rgba(0,0,0,.5);

opacity:0;

visibility:hidden;

transition:.4s;

z-index:8000;

}

.overlayMenu.show{

opacity:1;

visibility:visible;

}

.sideMenu{

position:fixed;

top:0;

left:-320px;

width:300px;

height:100%;

background:#111;

color:white;

padding:90px 35px;

transition:.5s;

z-index:9000;

}

.sideMenu.show{

left:0;

}

.sideMenu h5{

font-size:11px;

letter-spacing:4px;

text-transform:uppercase;

color:var(--gold-light);

margin-bottom:25px;

}

.sideMenu a{

display:block;

padding:15px 0;

font-family:"Cormorant Garamond",serif;

font-size:28px;

border-bottom:1px solid rgba(255,255,255,.08);

transition:.35s;

}

.sideMenu a:hover{

padding-left:10px;

color:var(--gold-light);

}

/*==========================
HERO
==========================*/

.hero{

height:55vh;

background:url("categories-banner.jpg") center/cover;

position:relative;

display:flex;

align-items:flex-end;

}

.hero::before{

content:"";

position:absolute;

inset:0;

background:linear-gradient(to top,
rgba(0,0,0,.78),
rgba(0,0,0,.15));

}

.heroContent{

position:relative;

z-index:2;

padding:35px 25px;

color:white;

}

.heroSmall{

font-size:11px;

letter-spacing:4px;

text-transform:uppercase;

color:var(--gold-light);

margin-bottom:10px;

}

.heroTitle{

font-size:46px;

line-height:1.05;

max-width:320px;

}

.heroDesc{

margin-top:15px;

font-size:15px;

opacity:.75;

line-height:1.7;

max-width:330px;

}

<script>

const header=document.querySelector(".header");

window.addEventListener("scroll",()=>{

if(window.scrollY>40){

header.classList.add("active");

}else{

header.classList.remove("active");

}

});

/* MENU */

const menu=document.querySelector(".sideMenu");

const overlay=document.querySelector(".overlayMenu");

const menuBtn=document.querySelector(".menu-btn");

const closeBtn=document.querySelector(".close-btn");

function openMenu(){

menu.classList.add("show");

overlay.classList.add("show");

document.body.style.overflow="hidden";

}

function closeMenu(){

menu.classList.remove("show");

overlay.classList.remove("show");

document.body.style.overflow="";

}

menuBtn.onclick=openMenu;

closeBtn.onclick=closeMenu;

overlay.onclick=closeMenu;

/* PRELOADER */

window.addEventListener("load",()=>{

setTimeout(()=>{

document.querySelector(".preloader").classList.add("hide");

},1200);

});

/* SCROLL REVEAL */

const reveals=document.querySelectorAll(".reveal");

const observer=new IntersectionObserver((entries)=>{

entries.forEach(entry=>{

if(entry.isIntersecting){

entry.target.classList.add("active");

}

});

},{threshold:.15});

reveals.forEach(item=>{

observer.observe(item);

});

/* CART BADGE */

let cart=JSON.parse(localStorage.getItem("cart"))||[];

let qty=0;

cart.forEach(item=>{

qty+=item.qty||1;

});

document.getElementById("cartCount").innerText=qty;

</script>
