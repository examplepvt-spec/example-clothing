```html
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Categories - EXAMPLE CLOTHING</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f5f5f5;
}

.header{
background:black;
color:white;
padding:20px;
text-align:center;
font-size:24px;
font-weight:bold;
}

.grid{
padding:20px;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
}

.card{
height:220px;
border-radius:15px;
display:flex;
align-items:center;
justify-content:center;
text-decoration:none;
color:white;
font-size:28px;
font-weight:bold;
transition:.3s;
}

.card:hover{
transform:scale(1.03);
}

.men{
background:#111;
}

.women{
background:#333;
}

.kids{
background:#555;
}

.sale{
background:#c62828;
}

.accessories{
background:#222;
}
</style>
</head>

<body>

<div class="header">
EXAMPLE CLOTHING
</div>

<div class="grid">

<a href="men.html" class="card men">
MEN
</a>

<a href="women.html" class="card women">
WOMEN
</a>

<a href="kids.html" class="card kids">
KIDS
</a>

<a href="sale.html" class="card sale">
SALE
</a>

<a href="accessories.html" class="card accessories">
ACCESSORIES
</a>

</div>

</body>
</html>
