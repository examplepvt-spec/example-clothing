```html
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Categories - EXAMPLE CLOTHING</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f5f5f5;
}

.header{
background:black;
color:white;
text-align:center;
padding:20px;
font-size:24px;
font-weight:bold;
}

.grid{
padding:20px;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
gap:20px;
}

.card{
position:relative;
height:250px;
border-radius:15px;
overflow:hidden;
text-decoration:none;
}

.card img{
width:100%;
height:100%;
object-fit:cover;
transition:.4s;
}

.card:hover img{
transform:scale(1.08);
}

.overlay{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.35);
display:flex;
align-items:center;
justify-content:center;
}

.overlay h2{
color:white;
font-size:30px;
letter-spacing:2px;
}

.back{
display:block;
text-align:center;
padding:20px;
text-decoration:none;
font-weight:bold;
color:black;
}
</style>
</head>

<body>

<div class="header">
EXAMPLE CLOTHING
</div>

<div class="grid">

<a href="men.html" class="card">
<img src="men.jpg">
<div class="overlay">
<h2>MEN</h2>
</div>
</a>

<a href="women.html" class="card">
<img src="women.jpg">
<div class="overlay">
<h2>WOMEN</h2>
</div>
</a>

<a href="kids.html" class="card">
<img src="kids.jpg">
<div class="overlay">
<h2>KIDS</h2>
</div>
</a>

<a href="sale.html" class="card">
<img src="sale.jpg">
<div class="overlay">
<h2>SALE</h2>
</div>
</a>

<a href="accessories.html" class="card">
<img src="accessories.jpg">
<div class="overlay">
<h2>ACCESSORIES</h2>
</div>
</a>

</div>

<a href="index.html" class="back">
← Back to Home
</a>

</body>
</html>
```
