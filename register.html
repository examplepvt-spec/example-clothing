<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Create Account</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f5f5f5;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
padding:20px;
}

.register-box{
width:100%;
max-width:400px;
background:#fff;
padding:30px;
border-radius:18px;
box-shadow:0 4px 20px rgba(0,0,0,.08);
}

h1{
text-align:center;
margin-bottom:10px;
font-size:30px;
}

p{
text-align:center;
color:#666;
margin-bottom:25px;
}

input{
width:100%;
padding:15px;
margin-bottom:15px;
border:1px solid #ddd;
border-radius:12px;
font-size:16px;
}

button{
width:100%;
padding:15px;
border:none;
border-radius:12px;
font-size:17px;
font-weight:bold;
cursor:pointer;
margin-bottom:12px;
}

#createBtn{
background:#111;
color:#fff;
}

#loginBtn{
background:#fff;
color:#111;
border:1px solid #111;
}

.links{
text-align:center;
margin-top:15px;
}

.links a{
text-decoration:none;
color:#111;
}
</style>
</head>

<body>

<div class="register-box">

<h1>Create Account</h1>

<p>Create your EXAMPLE CLOTHING account</p>

<input
type="text"
id="name"
placeholder="Full Name">

<input
type="email"
id="email"
placeholder="Email Address">

<input
type="password"
id="password"
placeholder="Password">

<input
type="password"
id="confirmPassword"
placeholder="Confirm Password">

<button id="createBtn">
Create Account
</button>

<button
id="loginBtn"
onclick="location.href='login.html'">
Already have an account?
</button>

<div class="links">

<a href="index.html">
← Back to Home
</a>

</div>

</div>

  <script type="module">

import { register } from "./auth.js";

document.getElementById("createBtn").onclick = async () => {

const name = document.getElementById("name").value.trim();
const email = document.getElementById("email").value.trim();
const password = document.getElementById("password").value;
const confirmPassword = document.getElementById("confirmPassword").value;

if(!name || !email || !password){
alert("Please fill all fields");
return;
}

if(password !== confirmPassword){
alert("Passwords do not match");
return;
}

try{

await register(name,email,password);

alert("Account Created Successfully");

window.location.href="login.html";

}
catch(error){

alert(error.message);

}

};

</script>

</body>
</html>
