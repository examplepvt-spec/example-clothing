<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shirts Collection</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#ffffff;
color:#111;
}

.header{
background:#ffffff;
color:#111;
padding:20px;
text-align:center;
font-size:28px;
font-weight:bold;
border-bottom:1px solid #e5e5e5;
}

.grid{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:20px;
padding:20px;
}

.card{
background:#ffffff;
border:none;
border-radius:18px;
overflow:hidden;
text-decoration:none;
color:#111;
box-shadow:0 4px 15px rgba(0,0,0,0.08);
}

.card img{
width:100%;
height:260px;
object-fit:contain;
padding:10px;
background:#f5f5f5;
}

.info{
padding:15px;
}

.name{
font-size:18px;
font-weight:bold;
margin-bottom:8px;
}

.price{
font-size:22px;
font-weight:bold;
color:#111;
}

.back{
display:block;
text-align:center;
padding:20px;
color:#111;
text-decoration:none;
}

@media(max-width:600px){
.grid{
grid-template-columns:1fr 1fr;
gap:12px;
padding:12px;
}
.card img{
height:220px;
}
}
</style>
</head>

<body>

<div class="header">
SHIRTS COLLECTION
</div>
<input
type="text"
id="search"
placeholder="Search Shirts..."
style="
width:90%;
margin:15px auto;
display:block;
padding:12px;
border-radius:8px;
border:none;
font-size:16px;
">
<div class="grid" id="products"></div>

<a href="men.html" class="back">
← Back to Men Collection
</a>

<script type="module">

import { db } from "./firebase.js";
import {
collection,
getDocs
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const productsDiv = document.getElementById("products");
const searchInput = document.getElementById("search");
const querySnapshot = await getDocs(collection(db,"products"));

querySnapshot.forEach((doc)=>{
searchInput.addEventListener("input", () => {
location.reload();
});
const product = doc.data();

if(product.category !== "Shirts"){
return;
}
const productName = product.name.toLowerCase();

if(
searchInput.value &&
!productName.includes(
searchInput.value.toLowerCase()
)
){
return;
}
productsDiv.innerHTML += `
<a href="product.html?id=${doc.id}" class="card">

<img src="${product.image}">

<div class="info">
<div class="name">${product.name}</div>
<div class="price">₹${product.price}</div>
</div>

</a>
`;

});

</script>

</body>
</html>
