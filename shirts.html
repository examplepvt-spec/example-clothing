<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shirts Collection</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#0f0f0f;
color:white;
}

.header{
background:black;
padding:20px;
text-align:center;
font-size:28px;
font-weight:bold;
}

.grid{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:20px;
padding:20px;
}

.card{
background:#181818;
border-radius:15px;
overflow:hidden;
text-decoration:none;
color:white;
transition:.3s;
}

.card:hover{
transform:translateY(-5px);
}

.card img{
width:100%;
height:300px;
object-fit:contain;
background:#f5f5f5;
}

.info{
padding:15px;
}

.name{
font-size:18px;
font-weight:bold;
margin-bottom:8px;
}

.price{
font-size:22px;
font-weight:bold;
color:#ffd700;
}

.back{
display:block;
text-align:center;
padding:20px;
color:white;
text-decoration:none;
}

@media(max-width:600px){
.grid{
grid-template-columns:1fr 1fr;
gap:12px;
padding:12px;
}
.card img{
height:220px;
}
}
</style>
</head>

<body>

<div class="header">
SHIRTS COLLECTION
</div>

<div class="grid">

<a href="tydm5913.html" class="card">
<img src="tydm5913.jpg">
<div class="info">
<div class="name">Tommy Denim Shirt OG</div>
<div class="price">₹1699</div>
</div>
</a>

<a href="bmblu3708.html" class="card">
<img src="bmblu3708.jpg">
<div class="info">
<div class="name">Balmain Paris</div>
<div class="price">₹1699</div>
</div>
</a>

</div>

<a href="men.html" class="back">
← Back to Men Collection
</a>

</body>
</html>
