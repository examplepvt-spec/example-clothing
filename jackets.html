<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jackets Collection</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#ffffff;
color:#111;
}

.header{
background:#ffffff;
padding:20px;
text-align:center;
font-size:28px;
font-weight:bold;
}

.grid{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:20px;
padding:20px;
}

.card{
background:#ffffff;
color:#111;
border:1px solid #e5e5e5;
overflow:hidden;
text-decoration:none;
color:#111;
}

.card img{
width:100%;
height:300px;
object-fit:contain;
background:#f5f5f5;
}

.info{
padding:15px;
}

.name{
font-size:18px;
font-weight:bold;
margin-bottom:8px;
}

.price{
font-size:22px;
font-weight:bold;
color:#111;
}

.back{
display:block;
text-align:center;
padding:20px;
color:#111;
text-decoration:none;
}

@media(max-width:600px){
.grid{
grid-template-columns:1fr 1fr;
gap:12px;
padding:12px;
}
.card img{
height:220px;
}
}
</style>
</head>

<body>

<div class="header">
JACKETS COLLECTION
</div>

<div class="grid" id="products"></div>

<a href="men.html" class="back">
← Back to Men Collection
</a>

<script type="module">

import { db } from "./firebase.js";

import {
collection,
getDocs
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const productsDiv = document.getElementById("products");

const querySnapshot = await getDocs(collection(db,"products"));

querySnapshot.forEach((doc)=>{

const product = doc.data();

if(product.category?.toLowerCase() !== "jackets"){
return;
}

productsDiv.innerHTML += `
<a href="product.html?id=${doc.id}" class="card">

<img src="${product.image}">

<div class="info">

<div class="name">${product.name}</div>

<div class="price">
${product.offerPrice
? `
<div style="text-decoration:line-through;color:#999;font-size:14px;">
₹${product.price}
</div>

<div style="font-size:22px;font-weight:bold;">
₹${product.offerPrice}
</div>
`
: `
₹${product.price}
`
}
</div>

<div style="font-size:14px;color:#666;margin-top:6px;">
Size: ${product.size || ""}
</div>

</div>
: `
₹${product.price}
`
}
</div>
</a>
`;

});

</script>

</body>
</html>
