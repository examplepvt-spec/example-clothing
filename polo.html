<!DOCTYPE html>
<html>
<head>
<title>Polo T-Shirts Collection</title>

<style>
body{
font-family:Arial,sans-serif;
margin:0;
background:#f5f5f5;
}

h1{
text-align:center;
padding:20px;
}

.products{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
gap:20px;
padding:20px;
}

.card{
background:white;
border-radius:12px;
overflow:hidden;
box-shadow:0 4px 15px rgba(0,0,0,0.1);
text-align:center;
}

.card img{
width:100%;
display:block;
}

.card h3{
margin:15px 0 10px;
}

.price{
font-size:24px;
font-weight:bold;
margin-bottom:15px;
}

.btn{
display:inline-block;
margin-bottom:20px;
padding:12px 25px;
background:black;
color:white;
text-decoration:none;
border-radius:8px;
}
</style>

</head>

<body>

<h1>Polo T-Shirts Collection</h1>

<div class="products">

<div class="card">
<img src="polo1-front.jpg">
<h3>Calvin Klein Polo</h3>
<div class="price">₹1499</div>
<a class="btn" href="polo1.html">View Product</a>
</div>

</div>

</body>
</html>
