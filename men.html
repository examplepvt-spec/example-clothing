<!DOCTYPE html>
<html>
<head>

<title>Men Collection</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#ffffff;
color:#111;
}

.header{
background:#ffffff;
padding:25px;
text-align:center;
font-size:28px;
font-weight:bold;
letter-spacing:2px;
}

.grid{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:20px;
padding:20px;
}

.card{
background:#ffffff;
border:1px solid #e5e5e5;
border-radius:15px;
padding:40px 15px;
text-align:center;
text-decoration:none;
color:#111;
}
.card:hover{
transform:translateY(-5px);
border-color:#777;
}

.card h2{
font-size:18px;
}

.back{
display:block;
text-align:center;
padding:40px 20px;
color:#111;
text-decoration:none;
font-size:20px;
margin-top:40px;
margin-bottom:40px;
}

@media(max-width:600px){
.grid{
gap:15px;
padding:15px;
}
.card{
padding:30px 10px;
}
}
</style>
</head>
