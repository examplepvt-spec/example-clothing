<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Men Collection - EXAMPLE CLOTHING</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

background:#0f0f0f;
color:white;
}

.header{
background:black;
padding:20px;
text-align:center;
font-size:28px;
font-weight:bold;
letter-spacing:2px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
gap:20px;
padding:20px;
}

.card{
background:#181818;
border-radius:15px;
overflow:hidden;
text-decoration:none;
color:white;
transition:.3s;
}

.card:hover{
transform:translateY(-5px);
}

.card img{
width:100%;
height:380px;
object-fit:cover;
}

.info{
padding:15px;
}

.name{
font-size:18px;
font-weight:bold;
margin-bottom:8px;
}

.price{
font-size:22px;
font-weight:bold;
color:#ffd700;
}

.back{
display:block;
text-align:center;
padding:20px;
color:white;
text-decoration:none;
}
</style>
</head>

<body>

<div class="header">

</div>

<div class="grid">

</a>
