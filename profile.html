<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Customer Profile — EXAMPLE CLOTHING</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Libre+Caslon+Display&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
:root{
  --ink:#161412;
  --ivory:#f6f3ec;
  --ivory-dim:#eee9dd;
  --brass:#9c7a3c;
  --brass-soft:#c7ab74;
  --line:#e2dccb;
  --white:#ffffff;
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  background:var(--ivory);
  color:var(--ink);
  font-family:'Inter',sans-serif;
  -webkit-font-smoothing:antialiased;
}

h1{
  font-family:'Libre Caslon Display',serif;
  font-weight:400;
}

a{
  color:inherit;
}

/* ---------- HEADER (shared) ---------- */

.header{
  position:sticky;
  top:0;
  width:100%;
  height:68px;
  background:rgba(246,243,236,.95);
  backdrop-filter:blur(10px);
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:0 18px;
  z-index:1000;
  border-bottom:1px solid var(--line);
}

.menu-btn{
  width:24px;
  height:18px;
  display:flex;
  flex-direction:column;
  justify-content:space-between;
  cursor:pointer;
  background:none;
  border:none;
  padding:0;
}

.menu-btn span{
  display:block;
  height:2px;
  background:var(--ink);
  border-radius:2px;
}

.logo-area{
  display:flex;
  align-items:center;
  gap:10px;
  flex:1;
  margin-left:18px;
}

.logo{
  width:34px;
  height:34px;
  border-radius:50%;
  object-fit:cover;
}

.logo-text{
  font-family:'Libre Caslon Display',serif;
  font-size:17px;
  letter-spacing:.3px;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}

.header-icons{
  display:flex;
  align-items:center;
  gap:6px;
}

.icon-link{
  position:relative;
  width:42px;
  height:42px;
  display:flex;
  align-items:center;
  justify-content:center;
  text-decoration:none;
  border-radius:50%;
  transition:background .2s;
}

.icon-link:hover{
  background:var(--ivory-dim);
}

.icon-link svg{
  width:21px;
  height:21px;
  stroke:var(--ink);
  fill:none;
  stroke-width:1.6;
}

.badge{
  position:absolute;
  top:2px;
  right:2px;
  background:var(--brass);
  color:var(--white);
  min-width:16px;
  height:16px;
  padding:0 3px;
  border-radius:50%;
  font-size:10px;
  font-weight:700;
  display:flex;
  align-items:center;
  justify-content:center;
}

/* ---------- SIDE MENU (shared) ---------- */

.side-menu{
  position:fixed;
  top:0;
  left:-300px;
  width:290px;
  height:100%;
  background:var(--ink);
  color:var(--ivory);
  padding:90px 32px 32px;
  transition:.4s cubic-bezier(.4,0,.2,1);
  z-index:2000;
}

.side-menu.open{
  left:0;
}

.menu-tag{
  font-size:11px;
  letter-spacing:2px;
  text-transform:uppercase;
  color:var(--brass-soft);
  margin-bottom:20px;
  display:block;
}

.side-menu a.nav-link{
  display:block;
  text-decoration:none;
  color:var(--ivory);
  font-family:'Libre Caslon Display',serif;
  font-size:22px;
  padding:13px 0;
  border-bottom:1px solid rgba(255,255,255,.1);
}

.close-btn{
  position:absolute;
  top:24px;
  right:24px;
  background:none;
  border:none;
  color:var(--ivory);
  font-size:26px;
  cursor:pointer;
  line-height:1;
}

.menu-overlay{
  display:none;
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,.4);
  z-index:1500;
}

.menu-overlay.open{
  display:block;
}

/* ---------- PROFILE LAYOUT ---------- */

.page-head{
  padding:28px 22px 10px;
}

.eyebrow-dark{
  font-size:11px;
  letter-spacing:2px;
  text-transform:uppercase;
  color:var(--brass);
  font-weight:700;
}

.page-head h1{
  font-size:28px;
  margin-top:6px;
}

/* AVATAR WRAP */
.avatar-section {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 10px 22px 24px;
  gap: 12px;
}

.avatar-container {
  width: 90px;
  height: 90px;
  border-radius: 50%;
  background: var(--ivory-dim);
  border: 1px solid var(--line);
  overflow: hidden;
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
}

.avatar-container img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.avatar-fallback {
  font-family: 'Libre Caslon Display', serif;
  font-size: 32px;
  color: var(--brass);
}

/* EDIT PROFILE FORM */
.info-grid {
  padding: 0 22px 20px;
  display: flex;
  flex-direction: column;
  gap: 16px;
}

.field-wrap {
  display: flex;
  flex-direction: column;
  gap: 6px;
}

.field-wrap label {
  font-size: 11px;
  letter-spacing: 1px;
  text-transform: uppercase;
  color: var(--brass);
  font-weight: 700;
}

.field-wrap input {
  width: 100%;
  padding: 13px 16px;
  border: 1px solid var(--line);
  border-radius: 6px;
  font-size: 14px;
  font-family: 'Inter', sans-serif;
  background: var(--white);
  color: var(--ink);
}

.field-wrap input[readonly] {
  background: var(--ivory-dim);
  color: #777;
  cursor: not-allowed;
}

.field-wrap input:focus:not([readonly]) {
  outline: none;
  border-color: var(--brass);
}

.save-btn {
  width: 100%;
  padding: 14px 20px;
  background: var(--ink);
  color: var(--white);
  border: none;
  border-radius: 6px;
  font-size: 14px;
  font-weight: 600;
  letter-spacing: 1px;
  text-transform: uppercase;
  cursor: pointer;
  transition: background .2s;
  margin-top: 10px;
}

.save-btn:hover {
  background: var(--brass);
}

/* ACCOUNT NAVIGATION MENU */
.profile-menu {
  padding: 10px 22px 40px;
  display: flex;
  flex-direction: column;
  gap: 12px;
}

.menu-heading {
  font-size: 11px;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--brass);
  font-weight: 700;
  margin-bottom: 4px;
}

.profile-menu-btn {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 16px 20px;
  background: var(--white);
  border: 1px solid var(--line);
  border-radius: 6px;
  text-decoration: none;
  color: var(--ink);
  font-weight: 500;
  font-size: 14px;
  transition: background .2s, border-color .2s;
}

.profile-menu-btn:hover {
  background: var(--ivory-dim);
  border-color: var(--brass-soft);
}

.profile-menu-btn svg {
  width: 16px;
  height: 16px;
  stroke: var(--ink);
  fill: none;
  stroke-width: 2;
}

.profile-menu-btn.logout-btn {
  color: #c92a2a;
  border-color: #f8d7da;
  background: rgba(201, 42, 42, 0.02);
}

.profile-menu-btn.logout-btn:hover {
  background: #fff5f5;
  border-color: #ffa8a8;
}

.profile-menu-btn.logout-btn svg {
  stroke: #c92a2a;
}

/* STATE MESSAGES */
.state-overlay {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: var(--ivory);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 3000;
  font-size: 15px;
  color: #8a8578;
}
</style>
</head>

<body>

<div id="stateOverlay" class="state-overlay">Loading your profile...</div>

<div class="menu-overlay" id="menuOverlay"></div>

<div class="header">

  <button class="menu-btn" id="menuBtn" aria-label="Open menu">
    <span></span><span></span><span></span>
  </button>

  <div class="logo-area">
    <img src="logo.png" class="logo" alt="EXAMPLE CLOTHING">
    <span class="logo-text">EXAMPLE CLOTHING</span>
  </div>

  <div class="header-icons">

    <a href="profile.html" id="accountBtn" class="icon-link" aria-label="Account">
      <svg viewBox="0 0 24 24"><path d="M12 12a4.5 4.5 0 1 0 0-9 4.5 4.5 0 0 0 0 9Z"/><path d="M4.5 20.5c1.4-3.6 4.3-5.5 7.5-5.5s6.1 1.9 7.5 5.5"/></svg>
    </a>

    <a href="wishlist.html" class="icon-link" aria-label="Wishlist">
      <svg viewBox="0 0 24 24"><path d="M12 20.2s-7.6-4.5-9.9-9C.6 8 2 4.5 5.4 3.7c2-.5 3.9.3 5 2 .3.4.5.9.6 1.3.1-.4.3-.9.6-1.3 1.1-1.7 3-2.5 5-2 3.4.8 4.8 4.3 3.3 7.5-2.3 4.5-9.9 9-9.9 9Z"/></svg>
    </a>

    <a href="cart.html" class="icon-link" aria-label="Cart">
      <svg viewBox="0 0 24 24"><path d="M4 7h16l-1.4 10.3a2 2 0 0 1-2 1.7H7.4a2 2 0 0 1-2-1.7L4 7Z"/><path d="M8 10V6a4 4 0 0 1 8 0v4"/></svg>
      <span class="badge" id="cartCount">0</span>
    </a>

  </div>

</div>

<div class="side-menu" id="menu">
  <button class="close-btn" id="closeMenuBtn" aria-label="Close menu">✕</button>
  <span class="menu-tag">Browse</span>
  <a href="men.html" class="nav-link">Men</a>
  <a href="women.html" class="nav-link">Women</a>
  <a href="kids.html" class="nav-link">Kids</a>
  <a href="sale.html" class="nav-link">Sale</a>
  <a href="accessories.html" class="nav-link">Accessories</a>
  <a href="footwear.html" class="nav-link">Footwear</a>
  <a href="login.html" class="nav-link" id="menuLoginLink">Login</a>
</div>

<div class="page-head">
  <span class="eyebrow-dark">Account</span>
  <h1>Your Profile</h1>
</div>

<div class="avatar-section">
  <div class="avatar-container" id="avatarContainer">
    <!-- Image dynamic insertion -->
  </div>
</div>

<form id="profileForm" class="info-grid">

  <div class="field-wrap">
    <label for="profilePhoto">Photo URL (Optional)</label>
    <input type="url" id="profilePhoto" placeholder="https://example.com/photo.jpg">
  </div>

  <div class="field-wrap">
    <label for="profileName">Full Name</label>
    <input type="text" id="profileName" required placeholder="Enter your full name">
  </div>

  <div class="field-wrap">
    <label for="profileEmail">Email Address</label>
    <input type="email" id="profileEmail" readonly>
  </div>

  <div class="field-wrap">
    <label for="profilePhone">Phone Number</label>
    <input type="tel" id="profilePhone" placeholder="Enter your phone number">
  </div>

  <button type="submit" class="save-btn" id="saveBtn">Save Profile Details</button>

</form>

<div class="profile-menu">

  <span class="menu-heading">Manage Account</span>

  <a href="saved-addresses.html" class="profile-menu-btn">
    <span>Saved Addresses</span>
    <svg viewBox="0 0 24 24"><path d="M5 12h14"/><path d="M12 5l7 7-7 7"/></svg>
  </a>

  <a href="my-orders.html" class="profile-menu-btn">
    <span>My Orders</span>
    <svg viewBox="0 0 24 24"><path d="M5 12h14"/><path d="M12 5l7 7-7 7"/></svg>
  </a>

  <a href="wishlist.html" class="profile-menu-btn">
    <span>Wishlist</span>
    <svg viewBox="0 0 24 24"><path d="M5 12h14"/><path d="M12 5l7 7-7 7"/></svg>
  </a>

  <button type="button" class="profile-menu-btn logout-btn" id="logoutBtn">
    <span>Log Out</span>
    <svg viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
  </button>

</div>

<script type="module">

import { db, auth } from "./firebase.js";
import { 
    onAuthStateChanged,
    signOut 
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { 
    doc, 
    getDoc, 
    setDoc, 
    updateDoc 
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const stateOverlay = document.getElementById("stateOverlay");
const profileForm = document.getElementById("profileForm");
const avatarContainer = document.getElementById("avatarContainer");

const profilePhotoInput = document.getElementById("profilePhoto");
const profileNameInput = document.getElementById("profileName");
const profileEmailInput = document.getElementById("profileEmail");
const profilePhoneInput = document.getElementById("profilePhone");
const saveBtn = document.getElementById("saveBtn");
const logoutBtn = document.getElementById("logoutBtn");

let currentUser = null;

// Routing & Data fetching on Auth change
onAuthStateChanged(auth, async (user) => {
    if (!user) {
        // Redirect to Login if unauthenticated
        window.location.href = "login.html";
        return;
    }

    currentUser = user;
    await loadUserProfile(user);
    stateOverlay.style.display = "none";
});

async function loadUserProfile(user) {
    try {
        const customerRef = doc(db, "customers", user.uid);
        const customerSnap = await getDoc(customerRef);

        let profileData = {};

        if (customerSnap.exists()) {
            profileData = customerSnap.data();
        } else {
            // Initialize default customer profile if none exists in Firestore yet [1]
            profileData = {
                name: user.displayName || "Valued Customer",
                email: user.email,
                phone: "",
                photo: user.photoURL || "",
                createdAt: new Date().toISOString()
            };
            await setDoc(customerRef, profileData);
        }

        // Fill Form
        profilePhotoInput.value = profileData.photo || "";
        profileNameInput.value = profileData.name || "";
        profileEmailInput.value = profileData.email || user.email;
        profilePhoneInput.value = profileData.phone || "";

        renderAvatar(profileData.photo, profileData.name);

    } catch (err) {
        console.error(err);
        alert("Could not load profile details. Please try again.");
    }
}

function renderAvatar(photoUrl, name) {
    if (photoUrl) {
        avatarContainer.innerHTML = `<img src="${photoUrl}" alt="${name || 'User'}" onerror="this.outerHTML='<div class=\'avatar-fallback\'>${getInitial(name)}</div>'">`;
    } else {
        avatarContainer.innerHTML = `<div class="avatar-fallback">${getInitial(name)}</div>`;
    }
}

function getInitial(name) {
    return (name || "U").trim().charAt(0).toUpperCase();
}

// Handle Profile Updates
profileForm.addEventListener("submit", async (e) => {
    e.preventDefault();
    if (!currentUser) return;

    saveBtn.innerText = "Saving...";
    saveBtn.disabled = true;

    const updatedData = {
        name: profileNameInput.value.trim(),
        phone: profilePhoneInput.value.trim(),
        photo: profilePhotoInput.value.trim()
    };

    try {
        const customerRef = doc(db, "customers", currentUser.uid);
       await setDoc(customerRef, updatedData, { merge: true });

        renderAvatar(updatedData.photo, updatedData.name);
        alert("Profile details updated successfully.");
    } catch (err) {
        console.error(err);
        alert("Failed to update profile. Please try again.");
    } finally {
        saveBtn.innerText = "Save Profile Details";
        saveBtn.disabled = false;
    }
});

// Logout Handler
logoutBtn.addEventListener("click", async () => {
    if (confirm("Are you sure you want to log out?")) {
        try {
            await signOut(auth);
            window.location.href = "login.html";
        } catch (err) {
            console.error(err);
            alert("An error occurred while logging out. Please try again.");
        }
    }
});

// Side drawer navigation toggle logic
const menu = document.getElementById("menu");
const overlay = document.getElementById("menuOverlay");

function openMenu(){
    menu.classList.add("open");
    overlay.classList.add("open");
}

function closeMenu(){
    menu.classList.remove("open");
    overlay.classList.remove("open");
}

document.getElementById("menuBtn").addEventListener("click", openMenu);
document.getElementById("closeMenuBtn").addEventListener("click", closeMenu);
overlay.addEventListener("click", closeMenu);

let cart = JSON.parse(localStorage.getItem("cart")) || [];
let totalQty = 0;
cart.forEach(item => { totalQty += item.qty || 1; });
document.getElementById("cartCount").innerText = totalQty;

const menuLoginLink = document.getElementById("menuLoginLink");
if (menuLoginLink) {
    menuLoginLink.style.display = "none"; // Hide standard login link since user is on profile page
}

</script>

</body>
</html>
