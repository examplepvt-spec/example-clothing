<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Profile</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f5f5f5;
padding:20px;
}

.box{
max-width:500px;
margin:auto;
background:white;
padding:25px;
border-radius:18px;
box-shadow:0 4px 15px rgba(0,0,0,.08);
}

h1{
text-align:center;
margin-bottom:25px;
}

.info{
margin-bottom:20px;
font-size:18px;
}

.info b{
display:block;
margin-bottom:5px;
}

.btn{
display:block;
width:100%;
padding:15px;
margin-top:12px;
background:#111;
color:white;
text-decoration:none;
text-align:center;
border:none;
border-radius:12px;
font-size:17px;
cursor:pointer;
}
</style>

</head>

<body>

<div class="box">

<h1>My Profile</h1>

<div class="info">
<b>Name</b>
<span id="name">Loading...</span>
</div>

<div class="info">
<b>Email</b>
<span id="email">Loading...</span>
</div>

<a href="orders.html" class="btn">
My Orders
</a>

<a href="wishlist.html" class="btn">
Wishlist
</a>

<a href="addresses.html" class="btn">
Saved Addresses
</a>

<button class="btn" id="logoutBtn">
Logout
</button>

</div>

<script type="module">

import { logout, checkUser, getProfile } from "./auth.js";
checkUser((user)=>{

if(!user){

window.location.href="login.html";
return;

}

document.getElementById("email").innerText = user.email;

const profile = await getProfile(user.uid);

if(profile){
document.getElementById("name").innerText = profile.name;
}else{
document.getElementById("name").innerText = "Customer";
}
});

document.getElementById("logoutBtn").onclick =
async()=>{

await logout();

window.location.href="login.html";

};

</script>

</body>
</html>
