<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Cart — EXAMPLE CLOTHING</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Libre+Caslon+Display&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
:root{
  --ink:#161412;
  --ivory:#f6f3ec;
  --ivory-dim:#eee9dd;
  --brass:#9c7a3c;
  --brass-soft:#c7ab74;
  --oxblood:#5e2430;
  --line:#e2dccb;
  --white:#ffffff;
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  background:var(--ivory);
  color:var(--ink);
  font-family:'Inter',sans-serif;
  padding-bottom:120px;
  -webkit-font-smoothing:antialiased;
}

a{ color:inherit; }

.header{
  background:rgba(246,243,236,.95);
  backdrop-filter:blur(10px);
  padding:0 18px;
  height:64px;
  display:flex;
  align-items:center;
  border-bottom:1px solid var(--line);
  position:sticky;
  top:0;
  z-index:100;
}

.back-btn{
  width:36px;
  height:36px;
  display:flex;
  align-items:center;
  justify-content:center;
  border-radius:50%;
  text-decoration:none;
}

.back-btn:hover{ background:var(--ivory-dim); }

.back-btn svg{
  width:19px;
  height:19px;
  stroke:var(--ink);
  fill:none;
  stroke-width:1.8;
}

.header-title{
  font-family:'Libre Caslon Display',serif;
  font-size:20px;
  flex:1;
  text-align:center;
  margin-right:36px;
}

#cart{
  padding:16px;
}

.cart-item{
  display:flex;
  gap:14px;
  background:var(--white);
  border:1px solid var(--line);
  border-radius:8px;
  padding:14px;
  margin-bottom:14px;
}

.product-image{
  width:96px;
  height:120px;
  object-fit:cover;
  border-radius:6px;
  background:var(--ivory-dim);
  flex-shrink:0;
}

.details{
  flex:1;
  display:flex;
  flex-direction:column;
  min-width:0;
}

.name{
  font-size:15px;
  font-weight:600;
  line-height:1.35;
  margin-bottom:4px;
}

.size-tag{
  font-size:12px;
  color:#666;
  margin-bottom:8px;
}

.price-row{
  display:flex;
  align-items:baseline;
  gap:8px;
  margin-bottom:4px;
}

.offer-price{
  font-size:18px;
  font-weight:700;
  font-family:'Libre Caslon Display',serif;
}

.old-price{
  font-size:13px;
  color:#999;
  text-decoration:line-through;
}

.qty-row{
  display:flex;
  align-items:center;
  margin-top:10px;
  gap:12px;
}

.qty-btn{
  width:28px;
  height:28px;
  border:1px solid var(--line);
  border-radius:50%;
  background:var(--white);
  color:var(--ink);
  font-size:16px;
  cursor:pointer;
  display:flex;
  align-items:center;
  justify-content:center;
}

.qty-btn:disabled{
  opacity:.35;
  cursor:not-allowed;
}

.qty{
  font-size:14px;
  font-weight:600;
  min-width:18px;
  text-align:center;
}

.remove{
  margin-top:10px;
  background:none;
  border:none;
  color:var(--oxblood);
  font-size:13px;
  font-weight:600;
  cursor:pointer;
  text-align:left;
  padding:0;
  align-self:flex-start;
}

.bottom-bar{
  position:fixed;
  left:0;
  right:0;
  bottom:0;
  background:var(--white);
  padding:14px 16px;
  box-shadow:0 -2px 14px rgba(0,0,0,.08);
  display:flex;
  justify-content:space-between;
  align-items:center;
  border-top:1px solid var(--line);
}

.total-box h3{
  font-size:12px;
  color:#666;
  text-transform:uppercase;
  letter-spacing:1px;
  font-weight:600;
}

.total-box h2{
  font-family:'Libre Caslon Display',serif;
  font-size:24px;
  margin-top:2px;
}

.pay-btn{
  background:var(--ink);
  color:var(--ivory);
  padding:15px 26px;
  border-radius:6px;
  text-decoration:none;
  font-size:15px;
  font-weight:600;
  letter-spacing:.3px;
  border:none;
  cursor:pointer;
}

.pay-btn.disabled{
  background:#ccc;
  color:#888;
  pointer-events:none;
  cursor:not-allowed;
}

.empty{
  text-align:center;
  padding:100px 20px;
  color:#777;
}

.empty h2{
  font-family:'Libre Caslon Display',serif;
  font-size:22px;
  color:var(--ink);
  margin-bottom:10px;
}

.empty a{
  display:inline-block;
  margin-top:20px;
  background:var(--ink);
  color:var(--ivory);
  padding:14px 24px;
  border-radius:6px;
  text-decoration:none;
  font-weight:600;
  font-size:14px;
}
</style>
</head>

<body>

<div class="header">
  <a href="javascript:history.back()" class="back-btn" aria-label="Back">
    <svg viewBox="0 0 24 24"><path d="M19 12H5"/><path d="M11 18l-6-6 6-6"/></svg>
  </a>
  <span class="header-title">My Cart</span>
</div>

<div id="cart"></div>

<div class="bottom-bar">
  <div class="total-box">
    <h3>Total</h3>
    <h2 id="total">₹0</h2>
  </div>
  <button class="pay-btn" id="proceedBtn">Proceed →</button>
</div>

<script>

let cart = JSON.parse(localStorage.getItem("cart")) || [];

const cartDiv = document.getElementById("cart");
const totalDiv = document.getElementById("total");
const proceedBtn = document.getElementById("proceedBtn");

proceedBtn.onclick = () => {
    if(cart.length === 0) return;
    window.location.href = "payment.html";
};

renderCart();

function escapeHtml(str){
    const div = document.createElement("div");
    div.innerText = str ?? "";
    return div.innerHTML;
}

function saveCart(){
    localStorage.setItem("cart", JSON.stringify(cart));
}

function renderCart(){

    cartDiv.innerHTML = "";

    if(cart.length === 0){
        cartDiv.innerHTML = `
            <div class="empty">
                <h2>Your cart is empty</h2>
                <p>Browse our collection and find something you love.</p>
                <a href="categories.html">Shop Now</a>
            </div>
        `;
        totalDiv.innerText = "₹0";
        proceedBtn.classList.add("disabled");
        return;
    }

    proceedBtn.classList.remove("disabled");

    let total = 0;

    cart.forEach((item, index) => {

        const qty = item.qty || 1;
        const unitPrice = Number(item.offerPrice || item.price) || 0;
        const lineTotal = unitPrice * qty;
        total += lineTotal;

        const el = document.createElement("div");
        el.className = "cart-item";
        el.innerHTML = `
            <img src="${escapeHtml(item.image) || ""}" class="product-image" alt="${escapeHtml(item.name)}" onerror="this.style.visibility='hidden'">

            <div class="details">
                <div class="name">${escapeHtml(item.name)}</div>
                ${item.size ? `<div class="size-tag">Size: ${escapeHtml(item.size)}</div>` : ""}

                <div class="price-row">
                    <span class="offer-price">₹${lineTotal}</span>
                    ${item.offerPrice ? `<span class="old-price">₹${Number(item.price) * qty}</span>` : ""}
                </div>

                <div class="qty-row">
                    <button class="qty-btn dec-btn" data-index="${index}" ${qty <= 1 ? "disabled" : ""} aria-label="Decrease quantity">−</button>
                    <span class="qty">${qty}</span>
                    <button class="qty-btn inc-btn" data-index="${index}" aria-label="Increase quantity">+</button>
                </div>

                <button class="remove" data-index="${index}">Remove</button>
            </div>
        `;
        cartDiv.appendChild(el);
    });

    totalDiv.innerText = "₹" + total;

    cartDiv.querySelectorAll(".inc-btn").forEach(btn => {
        btn.onclick = (e) => increaseQty(Number(e.currentTarget.dataset.index));
    });
    cartDiv.querySelectorAll(".dec-btn").forEach(btn => {
        btn.onclick = (e) => decreaseQty(Number(e.currentTarget.dataset.index));
    });
    cartDiv.querySelectorAll(".remove").forEach(btn => {
        btn.onclick = (e) => removeItem(Number(e.currentTarget.dataset.index));
    });
}

function removeItem(index){
    cart.splice(index, 1);
    saveCart();
    renderCart();
}

function increaseQty(index){
    if(!cart[index]) return;
    cart[index].qty = (cart[index].qty || 1) + 1;
    saveCart();
    renderCart();
}

function decreaseQty(index){
    if(!cart[index]) return;
    const qty = cart[index].qty || 1;
    if(qty > 1){
        cart[index].qty = qty - 1;
        saveCart();
        renderCart();
    }
}

</script>

</body>

</html>
