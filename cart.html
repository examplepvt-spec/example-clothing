<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Cart</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f7f7f7;
padding-bottom:120px;
color:#111;
}

.header{
background:#fff;
padding:18px;
font-size:28px;
font-weight:bold;
text-align:center;
border-bottom:1px solid #eee;
position:sticky;
top:0;
z-index:100;
}

#cart{
padding:15px;
}

.cart-item{
display:flex;
gap:15px;
background:#fff;
border-radius:18px;
padding:15px;
margin-bottom:15px;
box-shadow:0 2px 8px rgba(0,0,0,.08);
}

.product-image{
width:110px;
height:140px;
object-fit:cover;
border-radius:12px;
background:#f5f5f5;
flex-shrink:0;
}

.details{
flex:1;
display:flex;
flex-direction:column;
}

.name{
font-size:18px;
font-weight:bold;
line-height:1.4;
margin-bottom:8px;
}

.price-row{
display:flex;
align-items:center;
gap:8px;
margin-bottom:8px;
}

.offer-price{
font-size:22px;
font-weight:bold;
}

.old-price{
font-size:16px;
color:#888;
text-decoration:line-through;
}

.discount{
color:#ff5500;
font-size:14px;
font-weight:bold;
}


.size-row,
.qty-row{
display:flex;
align-items:center;
margin-top:10px;
gap:10px;
}

select{
padding:8px;
border:1px solid #ddd;
border-radius:8px;
background:#fff;
}

.qty-btn{
width:32px;
height:32px;
border:none;
border-radius:50%;
background:#111;
color:#fff;
font-size:18px;
cursor:pointer;
}

.qty{
font-size:18px;
font-weight:bold;
width:30px;
text-align:center;
}

.remove{
margin-top:15px;
background:none;
border:none;
color:#d00;
font-size:15px;
font-weight:bold;
cursor:pointer;
text-align:left;
}

.bottom-bar{
position:fixed;
left:0;
right:0;
bottom:0;
background:#fff;
padding:15px;
box-shadow:0 -2px 12px rgba(0,0,0,.12);
display:flex;
justify-content:space-between;
align-items:center;
}

.total-box h3{
font-size:15px;
color:#666;
}

.total-box h2{
font-size:26px;
margin-top:4px;
}

.pay-btn{
background:#111;
color:#fff;
padding:16px 28px;
border-radius:14px;
text-decoration:none;
font-size:18px;
font-weight:bold;
}

.empty{
text-align:center;
font-size:22px;
padding:80px 20px;
color:#777;
}

</style>

</head>

<body>

<div class="header">
My Cart
</div>

<div id="cart"></div>

<div class="bottom-bar">

<div class="total-box">
<h3>Total</h3>
<h2 id="total">₹0</h2>
</div>

<a href="payment.html" class="pay-btn">
Proceed →
</a>

</div>

<script>

let cart = JSON.parse(localStorage.getItem("cart")) || [];

const cartDiv = document.getElementById("cart");
const totalDiv = document.getElementById("total");

renderCart();

function renderCart(){

cartDiv.innerHTML="";

if(cart.length===0){

cartDiv.innerHTML=`
<div class="empty">
Your Cart is Empty
</div>
`;

totalDiv.innerText="₹0";

return;

}

let total=0;

cart.forEach((item,index)=>{

let qty=item.qty || 1;

total+=Number(item.offerPrice || item.price)*qty;

cartDiv.innerHTML+=`

<div class="cart-item">

<img
src="${item.image}"
class="product-image">

<div class="details">

<div class="name">
${item.name}
</div>

<div class="price-row">

<span class="offer-price">
₹${(item.offerPrice || item.price)*qty}
</span>

${
item.offerPrice
?

`<span class="old-price">
₹${item.price}
</span>`

:""

}

</div>

<div class="qty-row">

<button
class="qty-btn"
onclick="decreaseQty(${index})">
-
</button>

<span class="qty">
${qty}
</span>

<button
class="qty-btn"
onclick="increaseQty(${index})">
+
</button>

</div>

<button
class="remove"
onclick="removeItem(${index})">
Remove
</button>

</div>

</div>

`;

});

totalDiv.innerText="₹"+total;

}

function changeSize(index,size){

cart[index].size=size;

localStorage.setItem(
"cart",
JSON.stringify(cart)
);

renderCart();

}

function removeItem(index){

cart.splice(index,1);

localStorage.setItem(
"cart",
JSON.stringify(cart)
);

renderCart();

}

function increaseQty(index){

if(!cart[index].qty){
cart[index].qty=1;
}

cart[index].qty++;

localStorage.setItem(
"cart",
JSON.stringify(cart)
);

renderCart();

}

function decreaseQty(index){

if(!cart[index].qty){
cart[index].qty=1;
}

if(cart[index].qty>1){

cart[index].qty--;

localStorage.setItem(
"cart",
JSON.stringify(cart)
);

renderCart();

}

}

</script>

</body>

</html>
