<!-- Firestore and Authentication Script -->
<script type="module">  
import { app, auth, db } from "./firebase.js";
import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { 
  collection, 
  doc, 
  setDoc, 
  deleteDoc, 
  onSnapshot, 
  writeBatch 
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

// Menu controls  
const menu = document.getElementById("menu");  
const menuOverlay = document.getElementById("menuOverlay");  
const menuBtn = document.getElementById("menuBtn");  
const closeMenuBtn = document.getElementById("closeMenuBtn");  
  
function openMenu() {  
  if (menu && menuOverlay) {  
    menu.classList.add("open");  
    menuOverlay.classList.add("open");  
  }  
}  
  
function closeMenu() {  
  if (menu && menuOverlay) {  
    menu.classList.remove("open");  
    menuOverlay.classList.remove("open");  
  }  
}  
  
if (menuBtn) menuBtn.addEventListener("click", openMenu);  
if (closeMenuBtn) closeMenuBtn.addEventListener("click", closeMenu);  
if (menuOverlay) menuOverlay.addEventListener("click", closeMenu);  
  
// Cart badge (preserved reading from localStorage)
const cartCount = document.getElementById("cartCount");  
if (cartCount) {  
  try {  
    const cart = JSON.parse(localStorage.getItem("cart")) || [];  
    let totalQty = 0;  
    cart.forEach(item => { totalQty += item.qty || 1; });  
    cartCount.innerText = totalQty;  
  } catch(e) {  
    console.error(e);  
  }  
}  
  
// Address management  
const addressList = document.getElementById("addressList");  
const addressFormPanel = document.getElementById("addressFormPanel");  
const addressForm = document.getElementById("addressForm");  
const formTitle = document.getElementById("formTitle");  
const addAddressBtn = document.getElementById("addAddressBtn");  
const cancelFormBtn = document.getElementById("cancelFormBtn");  
const saveFormBtn = document.getElementById("saveFormBtn");  
  
const fullNameInput = document.getElementById("fullName");  
const addressLine1Input = document.getElementById("addressLine1");  
const addressLine2Input = document.getElementById("addressLine2");  
const cityInput = document.getElementById("city");  
const stateInput = document.getElementById("state");  
const zipCodeInput = document.getElementById("zipCode");  
const phoneInput = document.getElementById("phone");  
const isDefaultInput = document.getElementById("isDefault");  
  
let allAddresses = [];  
let editAddressId = null; // Storing document ID string instead of index
let unsubscribeAddresses = null;

// Handle authentication and load real-time addresses
onAuthStateChanged(auth, (user) => {
  if (user) {
    const addressesRef = collection(db, "customers", user.uid, "addresses");
    
    if (unsubscribeAddresses) {
      unsubscribeAddresses();
    }
    
    showState("Loading addresses...");
    
    unsubscribeAddresses = onSnapshot(addressesRef, (snapshot) => {
      allAddresses = [];
      snapshot.forEach((docSnap) => {
        allAddresses.push({
          id: docSnap.id,
          ...docSnap.data()
        });
      });
      // Sort default addresses first
      allAddresses.sort((a, b) => (b.isDefault || false) - (a.isDefault || false));
      renderAddresses();
    }, (error) => {
      console.error("Error loading addresses from Firestore:", error);
      showState("Error loading addresses. Check database rules.");
    });
  } else {
    if (unsubscribeAddresses) {
      unsubscribeAddresses();
      unsubscribeAddresses = null;
    }
    allAddresses = [];
    showState("Please log in to manage your addresses.");
  }
});
  
function renderAddresses() {  
  if (allAddresses.length === 0) {  
    showState("You have no saved addresses yet. Add one to get started!");  
    return;  
  }  
  
  addressList.innerHTML = allAddresses.map((addr) => {  
    const name = escapeHtml(addr.fullName);  
    const line1 = escapeHtml(addr.addressLine1);  
    const line2 = addr.addressLine2 ? escapeHtml(addr.addressLine2) : "";  
    const city = escapeHtml(addr.city);  
    const state = escapeHtml(addr.state);  
    const zip = escapeHtml(addr.zipCode);  
    const phone = escapeHtml(addr.phone);  
    const isDefault = addr.isDefault === true;  
  
    const defaultTag = isDefault ? `<span class="tag-default">Default</span>` : "";  
    const defaultAction = !isDefault   
      ? `<button class="action-btn" type="button" onclick="setDefaultAddress('${addr.id}')">Set as Default</button>`   
      : "";  
  
    return `  
      <div class="address-card">  
        <div class="address-header">  
          <span class="address-name">${name}</span>  
          ${defaultTag}  
        </div>  
        <div class="address-body">  
          ${line1}${line2 ? ", " + line2 : ""}<br>  
          ${city}, ${state} - ${zip}  
        </div>  
        <div class="address-phone">Phone: ${phone}</div>  
        <div class="address-actions">  
          <button class="action-btn" type="button" onclick="editAddress('${addr.id}')">Edit</button>  
          ${defaultAction}  
          <button class="action-btn delete-btn" type="button" onclick="deleteAddress('${addr.id}')">Delete</button>  
        </div>  
      </div>  
    `;  
  }).join("");  
}  
  
function showState(message) {  
  addressList.innerHTML = `<div class="state-msg">${escapeHtml(message)}</div>`;  
}  
  
function escapeHtml(str) {  
  const div = document.createElement("div");  
  div.innerText = str || "";  
  return div.innerHTML;  
}  
  
if (addAddressBtn) {  
  addAddressBtn.addEventListener("click", () => {  
    editAddressId = null;  
    formTitle.innerText = "Add New Address";  
    addressForm.reset();  
    isDefaultInput.checked = false;  
    addressFormPanel.classList.add("open");  
    addressFormPanel.scrollIntoView({ behavior: "smooth" });  
  });  
}  
  
if (cancelFormBtn) {  
  cancelFormBtn.addEventListener("click", () => {  
    addressFormPanel.classList.remove("open");  
    editAddressId = null;
  });  
}  
  
if (addressForm) {  
  addressForm.addEventListener("submit", async (e) => {  
    e.preventDefault();  
  
    const user = auth.currentUser;
    if (!user) {
      alert("Please log in to add or edit addresses.");
      return;
    }

    const isDefault = isDefaultInput.checked;  
    const addrData = {  
      fullName: fullNameInput.value.trim(),  
      addressLine1: addressLine1Input.value.trim(),  
      addressLine2: addressLine2Input.value.trim(),  
      city: cityInput.value.trim(),  
      state: stateInput.value.trim(),  
      zipCode: zipCodeInput.value.trim(),  
      phone: phoneInput.value.trim(),  
      isDefault: isDefault  
    };  
  
    try {
      const addressesRef = collection(db, "customers", user.uid, "addresses");
      const batch = writeBatch(db);

      // Handle updating existing or creating new document
      let docRef;
      if (editAddressId !== null) {  
        docRef = doc(db, "customers", user.uid, "addresses", editAddressId);
      } else {  
        docRef = doc(addressesRef);
      }  

      // If this address is set to default, set all others to false
      if (isDefault) {
        allAddresses.forEach((addr) => {
          if (addr.id !== editAddressId) {
            const otherDocRef = doc(db, "customers", user.uid, "addresses", addr.id);
            batch.update(otherDocRef, { isDefault: false });
          }
        });
      }

      batch.set(docRef, addrData);
      await batch.commit();

      addressFormPanel.classList.remove("open");  
    editAddressId = null;
  });  
}  
  
if (addressForm) {  
  addressForm.addEventListener("submit", async (e) => {  
    e.preventDefault();  
  
    const user = auth.currentUser;
    if (!user) {
      alert("Please log in to add or edit addresses.");
      return;
    }

    const isDefault = isDefaultInput.checked;  
    const addrData = {  
      fullName: fullNameInput.value.trim(),  
      addressLine1: addressLine1Input.value.trim(),  
      addressLine2: addressLine2Input.value.trim(),  
      city: cityInput.value.trim(),  
      state: stateInput.value.trim(),  
      zipCode: zipCodeInput.value.trim(),  
      phone: phoneInput.value.trim(),  
      isDefault: isDefault  
    };  
  
    try {
      const addressesRef = collection(db, "customers", user.uid, "addresses");
      const batch = writeBatch(db);

      // Handle updating existing or creating new document
      let docRef;
      if (editAddressId !== null) {  
        docRef = doc(db, "customers", user.uid, "addresses", editAddressId);
      } else {  
        docRef = doc(addressesRef);
      }  

      // If this address is set to default, set all others to false
      if (isDefault) {
        allAddresses.forEach((addr) => {
          if (addr.id !== editAddressId) {
            const otherDocRef = doc(db, "customers", user.uid, "addresses", addr.id);
            batch.update(otherDocRef, { isDefault: false });
          }
        });
      }

      batch.set(docRef, addrData);
      await batch.commit();

      addressFormPanel.classList.remove("open");  
      addressForm.reset();
      editAddressId = null;
    } catch (error) {
      console.error("Error writing address data to Firestore:", error);
      alert("Failed to save address. Please try again.");
    }
  });  
}  
  
window.editAddress = function(id) {  
  const addr = allAddresses.find(a => a.id === id);  
  if (!addr) return;  
  
  editAddressId = id;  
  formTitle.innerText = "Edit Address";  
  
  fullNameInput.value = addr.fullName || "";  
  addressLine1Input.value = addr.addressLine1 || "";  
  addressLine2Input.value = addr.addressLine2 || "";  
  cityInput.value = addr.city || "";  
  stateInput.value = addr.state || "";  
  zipCodeInput.value = addr.zipCode || "";  
  phoneInput.value = addr.phone || "";  
  isDefaultInput.checked = addr.isDefault === true;  
  
  addressFormPanel.classList.add("open");  
  addressFormPanel.scrollIntoView({ behavior: "smooth" });  
};  
  
window.setDefaultAddress = async function(id) {  
  const user = auth.currentUser;
  if (!user) return;
    
  try {
    const batch = writeBatch(db);
    allAddresses.forEach((addr) => {
      const docRef = doc(db, "customers", user.uid, "addresses", addr.id);
      batch.update(docRef, { isDefault: (addr.id === id) });
    });
    await batch.commit();
  } catch (error) {
    console.error("Error setting default address in Firestore:", error);
    alert("Failed to update default address.");
  }
};  
  
window.deleteAddress = async function(id) {  
  const user = auth.currentUser;
  if (!user) return;

  if (confirm("Are you sure you want to delete this address?")) {  
    try {
      const docRef = doc(db, "customers", user.uid, "addresses", id);
      await deleteDoc(docRef);
    } catch (error) {
      console.error("Error deleting address from Firestore:", error);
      alert("Failed to delete address.");
    }
  }  
};
