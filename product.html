<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Product Details</title>

<style>
body{
background:#ffffff;
color:#111;
font-family:Arial,sans-serif;
padding:20px;
}

.slider{
position:relative;
background:#f5f5f5;
border-radius:20px;
overflow:hidden;
margin-bottom:20px;
}

.slider img{
width:100%;
height:380px;
object-fit:contain;
background:#f5f5f5;
}

.slide-btn{
position:absolute;
top:50%;
transform:translateY(-50%);
width:40px;
height:40px;
border:none;
border-radius:50%;
background:white;
font-size:26px;
cursor:pointer;
}

#prev{
left:10px;
}

#next{
right:10px;
}

.counter{
position:absolute;
bottom:15px;
left:50%;
transform:translateX(-50%);
background:white;
padding:6px 14px;
border-radius:20px;
font-size:14px;
}
h1{
margin-top:20px;
font-size:34px;
font-weight:700;
line-height:1.2;
letter-spacing:-1px;
color:#111;
}
.price-box{
display:flex;
align-items:center;
gap:12px;
margin:15px 0 5px;
}

.old-price{
font-size:20px;
color:#999;
text-decoration:line-through;
}

.price{
font-size:34px;
font-weight:700;
color:#111;
}

.discount{
font-size:16px;
font-weight:600;
color:#ff5500;
margin-bottom:15px;
}

.info{
margin:8px 0;
font-size:17px;
color:#666;
font-weight:500;
}
.btn{
display:block;
width:100%;
padding:18px;
margin-top:15px;
text-align:center;
text-decoration:none;
border-radius:16px;
font-weight:600;
font-size:18px;
border:none;
box-sizing:border-box;
}
#wishlist{
background:#ffffff;
color:#111;
border:1px solid #ddd;
}
#whatsapp{
background:#111;
}

#addToCart{
background:#111;
color:#white;
}
.cart-btn{
position:fixed;
top:15px;
right:15px;
background:#111;
color:white;
padding:12px 18px;
border-radius:30px;
text-decoration:none;
font-weight:bold;
z-index:9999;
display:flex;
align-items:center;
gap:8px;
}
#cartCount{
background:#111;
color:#ffffff;
padding:2px 6px;
border-radius:50%;
font-size:12px;
margin-left:5px;
}
.sizes{
display:flex;
gap:10px;
flex-wrap:wrap;
margin:20px 0;
}

.sizes button{
width:55px;
height:55px;
border:1px solid #ddd;
border-radius:12px;
background:white;
font-size:18px;
font-weight:600;
cursor:pointer;
}

.sizes button:hover{
background:#111;
color:white;
}
</style>
</head>

<body>

<a href="cart.html" class="cart-btn">
🛍️ <span id="cartCount">0</span>
</a>
<div class="slider">

<img id="productImage" src="">

<button id="prev" class="slide-btn">‹</button>

<button id="next" class="slide-btn">›</button>

<div class="counter">
<span id="current">1</span> /
<span id="total">1</span>
</div>

</div>

<h1 id="name"></h1>

<div class="price-box">
    <span class="old-price" id="oldPrice"></span>
    <span class="price" id="price"></span>
</div>

<div class="discount" id="discount"></div>
<h3>Select Size</h3>

<div class="sizes">

<button id="sizeXS">XS</button>

<button id="sizeS">S</button>

<button id="sizeM">M</button>

<button id="sizeL">L</button>

<button id="sizeXL">XL</button>

<button id="sizeXXL">XXL</button>

</div>

<div class="info">Barcode: <span id="barcode"></span></div>



<button class="btn" id="wishlist">
♡ Wishlist
</button>
<button class="btn" id="addToCart">
Add To Cart
</button>
<a class="btn" href="#" id="whatsapp">
WhatsApp Order
</a>

<script type="module">

import { db } from "./firebase.js";

import {
doc,
getDoc
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const params = new URLSearchParams(window.location.search);
const id = params.get("id");

const docRef = doc(db,"products",id);
const docSnap = await getDoc(docRef);

if(docSnap.exists()){

const product = docSnap.data();
document.getElementById("addToCart").onclick = () => {

let cart = JSON.parse(
localStorage.getItem("cart")
) || [];

cart.push({
    name: product.name,
    price: product.price,
    offerPrice: product.offerPrice,
    image: product.image
});

localStorage.setItem(
    "cart",
    JSON.stringify(cart)
);


localStorage.setItem(
"cart",
JSON.stringify(cart)
);


};
document.getElementById("wishlist").onclick = () => {

let wishlist = JSON.parse(
localStorage.getItem("wishlist")
) || [];

wishlist.push({
id:id,
name:product.name,
price:product.price,
image:product.image
});

localStorage.setItem(
"wishlist",
JSON.stringify(wishlist)
);



const images = [
product.image?.replace("/upload/","/upload/f_auto,q_auto,w_900/"),
product.image2?.replace("/upload/","/upload/f_auto,q_auto,w_900/"),
product.image3?.replace("/upload/","/upload/f_auto,q_auto,w_900/")
].filter(Boolean);

let currentImage = 0;

const imageElement =
document.getElementById("productImage");

imageElement.src = images[0];

document.getElementById("total").innerText =
images.length;

imageElement.src = images[0];

images.forEach(src => {
    const img = new Image();
    img.src = src;
});

document.getElementById("total").innerText =
images.length;

document.getElementById("next").onclick = () => {

currentImage++;

if(currentImage >= images.length){
currentImage = 0;
}

imageElement.src = images[currentImage];

document.getElementById("current").innerText =
currentImage + 1;

};

document.getElementById("prev").onclick = () => {

currentImage--;

if(currentImage < 0){
currentImage = images.length - 1;
}

imageElement.src = images[currentImage];

document.getElementById("current").innerText =
currentImage + 1;

};
document.getElementById("name").innerText = product.name;
document.getElementById("price").innerText =
"₹" + product.price;

document.getElementById("oldPrice").innerText =
"₹" + product.price;

if(product.offerPrice){

document.getElementById("oldPrice").innerText =
"₹" + product.price;

document.getElementById("price").innerText =
"₹" + product.offerPrice;

const discount = Math.round(
((product.price - product.offerPrice)
/ product.price) * 100
);

document.getElementById("discount").innerText =
discount + "% OFF";

}else{

document.getElementById("oldPrice").style.display =
"none";

document.getElementById("discount").style.display =
"none";

document.getElementById("price").innerText =
"₹" + product.price;

}
document.getElementById("barcode").innerText = product.barcode;
if(product.xsStock == 0 || !product.xsStock)
document.getElementById("sizeXS").style.display = "none";

if(product.sStock == 0 || !product.sStock)
document.getElementById("sizeS").style.display = "none";

if(product.mStock == 0 || !product.mStock)
document.getElementById("sizeM").style.display = "none";

if(product.lStock == 0 || !product.lStock)
document.getElementById("sizeL").style.display = "none";

if(product.xlStock == 0 || !product.xlStock)
document.getElementById("sizeXL").style.display = "none";

if(product.xxlStock == 0 || !product.xxlStock)
document.getElementById("sizeXXL").style.display = "none";

if(product.xsStock > 0)
document.getElementById("sizeXS").innerText =
"XS (" + product.xsStock + ")";

if(product.sStock > 0)
document.getElementById("sizeS").innerText =
"S (" + product.sStock + ")";

if(product.mStock > 0)
document.getElementById("sizeM").innerText =
"M (" + product.mStock + ")";

if(product.lStock > 0)
document.getElementById("sizeL").innerText =
"L (" + product.lStock + ")";

if(product.xlStock > 0)
document.getElementById("sizeXL").innerText =
"XL (" + product.xlStock + ")";

if(product.xxlStock > 0)
document.getElementById("sizeXXL").innerText =
"XXL (" + product.xxlStock + ")";
document.getElementById("whatsapp").href =
"https://wa.me/919656003555?text=I want " + product.name;



}
let cart = JSON.parse(localStorage.getItem("cart")) || [];

    
document.getElementById("cartCount").innerText = cart.length;
  
</script>

</body>
</html>
