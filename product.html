<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Product Details</title>

<style>
body{
background:#111;
color:white;
font-family:Arial,sans-serif;
padding:20px;
}

#gallery img{
width:100%;
max-width:500px;
display:block;
margin:15px auto;
border-radius:10px;
}

h1{
margin-top:20px;
}

.price{
font-size:30px;
color:gold;
font-weight:bold;
margin:15px 0;
}

.info{
margin:10px 0;
font-size:18px;
}

.btn{
display:block;
background:#25D366;
color:white;
text-align:center;
padding:15px;
margin-top:20px;
text-decoration:none;
border-radius:10px;
font-weight:bold;
}
</style>
</head>

<body>

<div id="gallery"></div>

<h1 id="name"></h1>

<div class="price" id="price"></div>

<div class="info">Size: <span id="size"></span></div>

<div class="info">Barcode: <span id="barcode"></span></div>

<div class="info">Stock: <span id="stock"></span></div>
<button class="btn" id="wishlist">
❤️ Add To Wishlist
</button>
<button class="btn" id="addToCart">
Add To Cart
</button>
<a class="btn" href="#" id="whatsapp">
WhatsApp Order
</a>

<script type="module">

import { db } from "./firebase.js";

import {
doc,
getDoc
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const params = new URLSearchParams(window.location.search);
const id = params.get("id");

const docRef = doc(db,"products",id);
const docSnap = await getDoc(docRef);

if(docSnap.exists()){

const product = docSnap.data();
document.getElementById("addToCart").onclick = () => {

let cart = JSON.parse(
localStorage.getItem("cart")
) || [];

cart.push({
id:id,
name:product.name,
price:product.price,
image:product.image
});

localStorage.setItem(
"cart",
JSON.stringify(cart)
);

alert("Added to Cart");

};
let images = "";

if(product.image){
images += `<img src="${product.image}">`;
}

if(product.image2){
images += `<img src="${product.image2}">`;
}

if(product.image3){
images += `<img src="${product.image3}">`;
}

document.getElementById("gallery").innerHTML = images;
document.getElementById("name").innerText = product.name;
document.getElementById("price").innerText = "₹" + product.price;
document.getElementById("size").innerText = product.size;
document.getElementById("barcode").innerText = product.barcode;
document.getElementById("stock").innerText = product.stock;

document.getElementById("whatsapp").href =
"https://wa.me/919656003555?text=I want " + product.name;

}

</script>

</body>
</html>
