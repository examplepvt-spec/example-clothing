<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Product Details</title>

<style>
body{
background:#ffffff;
color:#111;
font-family:Arial,sans-serif;
padding:20px;
}

.slider{
position:relative;
background:#f5f5f5;
border-radius:20px;
overflow:hidden;
margin-bottom:20px;
}

.slider img{
width:100%;
height:450px;
object-fit:contain;
background:#f5f5f5;
}

.slide-btn{
position:absolute;
top:50%;
transform:translateY(-50%);
width:40px;
height:40px;
border:none;
border-radius:50%;
background:white;
font-size:26px;
cursor:pointer;
}

#prev{
left:10px;
}

#next{
right:10px;
}

.counter{
position:absolute;
bottom:15px;
left:50%;
transform:translateX(-50%);
background:white;
padding:6px 14px;
border-radius:20px;
font-size:14px;
}
h1{
margin-top:20px;
color:#111;
font-size:48px;
font-weight:700;
}
.price-box{
display:flex;
align-items:center;
gap:12px;
margin:15px 0 5px;
}

.old-price{
font-size:20px;
color:#999;
text-decoration:line-through;
}

.price{
font-size:34px;
font-weight:700;
color:#111;
}

.discount{
font-size:16px;
font-weight:600;
color:#ff5500;
margin-bottom:15px;
}

.info{
margin:10px 0;
font-size:18px;
color:#444;
}
.btn{
display:block;
width:220px;
padding:16px;
margin-top:15px;
text-align:center;
text-decoration:none;
border-radius:12px;
font-weight:bold;
font-size:18px;
border:none;
}  
#wishlist{
background:white;
color:#111;
border:1px solid #ddd;
}
#whatsapp{
background:#111;
}

#addToCart{
background:#111;
color:#ffffff;
}
.cart-btn{
position:fixed;
top:15px;
right:15px;
background:#111;
color:white;
padding:12px 18px;
border-radius:30px;
text-decoration:none;
font-weight:bold;
z-index:9999;
display:flex;
align-items:center;
gap:8px;
}
#cartCount{
background:#111;
color:#ffffff;
padding:2px 6px;
border-radius:50%;
font-size:12px;
margin-left:5px;
}
</style>
</head>

<body>

<a href="cart.html" class="cart-btn">
🛍️ <span id="cartCount">0</span>
</a>
<div class="slider">

<img id="productImage" src="">

<button id="prev" class="slide-btn">‹</button>

<button id="next" class="slide-btn">›</button>

<div class="counter">
<span id="current">1</span> /
<span id="total">1</span>
</div>

</div>

<h1 id="name"></h1>

<div class="price-box">
    <span class="old-price" id="oldPrice"></span>
    <span class="price" id="price"></span>
</div>

<div class="discount" id="discount"></div>

<div class="info">Size: <span id="size"></span></div>

<div class="info">Barcode: <span id="barcode"></span></div>

<div class="info">Stock: <span id="stock"></span></div>

<button class="btn" id="wishlist">
♡ Wishlist
</button>
<button class="btn" id="addToCart">
Add To Cart
</button>
<a class="btn" href="#" id="whatsapp">
WhatsApp Order
</a>

<script type="module">

import { db } from "./firebase.js";

import {
doc,
getDoc
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const params = new URLSearchParams(window.location.search);
const id = params.get("id");

const docRef = doc(db,"products",id);
const docSnap = await getDoc(docRef);

if(docSnap.exists()){

const product = docSnap.data();
document.getElementById("addToCart").onclick = () => {

let cart = JSON.parse(
localStorage.getItem("cart")
) || [];

cart.push({
id:id,
name:product.name,
price:product.price,
image:product.image
});

localStorage.setItem(
"cart",
JSON.stringify(cart)
);

alert("Added to Cart");

};
document.getElementById("wishlist").onclick = () => {

let wishlist = JSON.parse(
localStorage.getItem("wishlist")
) || [];

wishlist.push({
id:id,
name:product.name,
price:product.price,
image:product.image
});

localStorage.setItem(
"wishlist",
JSON.stringify(wishlist)
);

alert("Added to Wishlist");

};
const images = [
product.image,
product.image2,
product.image3
].filter(Boolean);

let currentImage = 0;

const imageElement =
document.getElementById("productImage");

imageElement.src = images[0];

document.getElementById("total").innerText =
images.length;

document.getElementById("next").onclick = () => {

currentImage++;

if(currentImage >= images.length){
currentImage = 0;
}

imageElement.src = images[currentImage];

document.getElementById("current").innerText =
currentImage + 1;

};

document.getElementById("prev").onclick = () => {

currentImage--;

if(currentImage < 0){
currentImage = images.length - 1;
}

imageElement.src = images[currentImage];

document.getElementById("current").innerText =
currentImage + 1;

};
document.getElementById("name").innerText = product.name;
document.getElementById("price").innerText =
"₹" + product.price;

const oldPrice =
Math.round(Number(product.price) * 1.4);

document.getElementById("oldPrice").innerText =
"₹" + oldPrice;

const discount =
Math.round(
((oldPrice - product.price) / oldPrice) * 100
);

document.getElementById("discount").innerText =
discount + "% OFF";
document.getElementById("size").innerText = product.size;
document.getElementById("barcode").innerText = product.barcode;
document.getElementById("stock").innerText = product.stock;

document.getElementById("whatsapp").href =
"https://wa.me/919656003555?text=I want " + product.name;

}
let cart = JSON.parse(localStorage.getItem("cart")) || [];

document.getElementById("cartCount").innerText = cart.length;
  
</script>

</body>
</html>
