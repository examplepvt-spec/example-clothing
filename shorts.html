<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shorts Collection</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#ffffff;
color:#111;
}

.header{
background:#ffffff;
color:#111;
padding:20px;
text-align:center;
font-size:28px;
font-weight:bold;
border-bottom:1px solid #e5e5e5;
}

.grid{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:20px;
padding:20px;
}

.card{
background:#181818;
border-radius:15px;
overflow:hidden;
text-decoration:none;
color:#111;
transition:.3s;
}

.card:hover{
transform:translateY(-5px);
}

.card img{
width:100%;
height:300px;
object-fit:contain;
background:#f5f5f5;
}

.info{
padding:15px;
}

.name{
font-size:18px;
font-weight:bold;
margin-bottom:8px;
}

.price{
font-size:22px;
font-weight:bold;
color:#ffd700;
}

.back{
display:block;
text-align:center;
padding:20px;
color:#111;
text-decoration:none;
}
</style>
</head>

<body>

<div class="header">
SHORTS COLLECTION
</div>

<div class="grid">

<a href="sb8053.html" class="card">
<img src="sb8053.jpg">
<div class="info">
<div class="name">S&B Shorts</div>
<div class="price">₹899</div>
</div>
</a>

<a href="hm9528.html" class="card">
<img src="hm9528.jpg">
<div class="info">
<div class="name">H&M Shorts</div>
<div class="price">₹699</div>
</div>
</a>

</div>

<a href="men.html" class="back">
← Back to Men Collection
</a>

</body>
</html>
