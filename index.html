<script>
(function() {
  'use strict';

  // ============================================
  // PRELOADER
  // ============================================
  var preloader = document.getElementById('preloader');
  var loadCounter = document.getElementById('loadCounter');
  var count = 0;
  var preloaderDone = false;

  function finishPreloader() {
    if (preloaderDone) return;
    preloaderDone = true;
    if (loadCounter) loadCounter.textContent = '100';
    setTimeout(function() {
      if (preloader) preloader.classList.add('done');
    }, 400);
  }

  var counterInterval = setInterval(function() {
    count += Math.floor(Math.random() * 12) + 8;
    if (count >= 100) {
      count = 100;
      clearInterval(counterInterval);
    }
    if (loadCounter) loadCounter.textContent = count;
  }, 80);

  if (document.readyState === 'complete') {
    finishPreloader();
  } else {
    window.addEventListener('load', finishPreloader, { once: true });
  }
  setTimeout(finishPreloader, 4500);

  // ============================================
  // FLOATING PARTICLES
  // ============================================
  var particlesContainer = document.getElementById('particles');
  if (particlesContainer) {
    for (var i = 0; i < 15; i++) {
      var p = document.createElement('div');
      p.className = 'particle';
      p.style.left = Math.random() * 100 + '%';
      p.style.animationDelay = Math.random() * 15 + 's';
      p.style.animationDuration = (10 + Math.random() * 10) + 's';
      p.style.width = (2 + Math.random() * 3) + 'px';
      p.style.height = p.style.width;
      particlesContainer.appendChild(p);
    }
  }

  // ============================================
  // MENU SYSTEM
  // ============================================
  var menu = document.getElementById('menu');
  var overlay = document.getElementById('menuOverlay');
  var menuBtn = document.getElementById('menuBtn');
  var closeMenuBtn = document.getElementById('closeMenuBtn');

  function openMenu() {
    if (!menu || !overlay || !menuBtn) return;
    menu.classList.add('open');
    overlay.classList.add('open');
    menuBtn.classList.add('active');
    document.body.style.overflow = 'hidden';
    document.body.style.touchAction = 'none';
  }

  function closeMenu() {
    if (!menu || !overlay || !menuBtn) return;
    menu.classList.remove('open');
    overlay.classList.remove('open');
    menuBtn.classList.remove('active');
    document.body.style.overflow = '';
    document.body.style.touchAction = '';
  }

  if (menuBtn) menuBtn.addEventListener('click', openMenu);
  if (closeMenuBtn) closeMenuBtn.addEventListener('click', closeMenu);
  if (overlay) overlay.addEventListener('click', closeMenu);

  document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape') closeMenu();
  });

  // Touch swipe to close menu
  var touchStartX = 0;
  if (menu) {
    menu.addEventListener('touchstart', function(e) {
      touchStartX = e.touches[0].clientX;
    }, { passive: true });
    menu.addEventListener('touchend', function(e) {
      var touchEndX = e.changedTouches[0].clientX;
      if (touchEndX - touchStartX < -80) closeMenu();
    }, { passive: true });
  }

  // ============================================
  // HEADER SCROLL BEHAVIOR
  // ============================================
  var header = document.getElementById('header');
  var lastY = 0;
  var ticking = false;

  function updateHeader() {
    var y = window.scrollY || window.pageYOffset;
    var heroH = window.innerHeight - 80;
    if (header) {
      if (y > heroH) {
        header.classList.add('solid');
        header.classList.remove('on-hero');
      } else {
        header.classList.remove('solid');
        header.classList.add('on-hero');
      }
      if (y > lastY && y > heroH + 100) {
        header.classList.add('hide');
      } else {
        header.classList.remove('hide');
      }
    }
    lastY = y;
    ticking = false;
  }

  window.addEventListener('scroll', function() {
    if (!ticking) {
      requestAnimationFrame(updateHeader);
      ticking = true;
    }
  }, { passive: true });

  // ============================================
  // REVEAL ON SCROLL
  // ============================================
  var revealObserver = new IntersectionObserver(function(entries) {
    entries.forEach(function(entry) {
      if (entry.isIntersecting) {
        var delay = entry.target.dataset.revealDelay || 0;
        setTimeout(function() {
          entry.target.classList.add('in');
        }, parseInt(delay));
        revealObserver.unobserve(entry.target);
      }
    });
  }, { threshold: 0.1, rootMargin: '0px 0px -30px 0px' });

  document.querySelectorAll('.reveal, .reveal-scale').forEach(function(el) {
    revealObserver.observe(el);
  });

  // ============================================
  // PARALLAX HERO
  // ============================================
  var heroVideo = document.querySelector('.hero-bg video');
  if (heroVideo) {
    var parallaxTicking = false;
    window.addEventListener('scroll', function() {
      if (!parallaxTicking) {
        requestAnimationFrame(function() {
          var scrollY = window.scrollY || window.pageYOffset;
          if (scrollY < window.innerHeight) {
            heroVideo.style.transform = 'scale(1) translateY(' + (scrollY * 0.3) + 'px)';
          }
          parallaxTicking = false;
        });
        parallaxTicking = true;
      }
    }, { passive: true });
  }

  // ============================================
  // TOUCH-HOVER SYSTEM
  // ============================================
  var touchTimers = {};

  function addTouchHover(el) {
    el.classList.add('hovered');
    if (touchTimers[el]) {
      clearTimeout(touchTimers[el]);
    }
  }

  function removeTouchHover(el) {
    touchTimers[el] = setTimeout(function() {
      el.classList.remove('hovered');
      delete touchTimers[el];
    }, 800);
  }

  var hoverTargets = document.querySelectorAll(
    '.btn, .view-btn, .quick-add, .featured-card, .cat, .craft-item, ' +
    '.icon-link, .menu-btn, .close-btn, .social-links a, .whatsapp-float, .logo-area'
  );

  hoverTargets.forEach(function(el) {
    el.addEventListener('touchstart', function(e) {
      addTouchHover(el);
    }, { passive: true });

    el.addEventListener('touchend', function(e) {
      removeTouchHover(el);
    }, { passive: true });

    el.addEventListener('touchcancel', function(e) {
      removeTouchHover(el);
    }, { passive: true });
  });

  var featuredCards = document.querySelectorAll('.featured-card');
  featuredCards.forEach(function(card) {
    card.addEventListener('touchstart', function(e) {
      card.classList.add('hovered');
    }, { passive: true });
    card.addEventListener('touchend', function(e) {
      setTimeout(function() {
        card.classList.remove('hovered');
      }, 800);
    }, { passive: true });
  });

  // ============================================
  // CART FUNCTIONALITY
  // ============================================
  var cart = [];
  try {
    var stored = JSON.parse(localStorage.getItem('cart'));
    if (Array.isArray(stored)) cart = stored;
  } catch (e) {}

  function updateCartCount() {
    var totalQty = 0;
    cart.forEach(function(item) { totalQty += item.qty || 1; });
    var badge = document.getElementById('cartCount');
    if (badge) {
      badge.innerText = totalQty;
      badge.style.display = totalQty > 0 ? 'flex' : 'none';
    }
  }
  updateCartCount();

  window.addToCart = function(name, price) {
    var existing = cart.find(function(item) { return item.name === name; });
    if (existing) {
      existing.qty = (existing.qty || 1) + 1;
    } else {
      cart.push({ name: name, price: price, qty: 1 });
    }
    localStorage.setItem('cart', JSON.stringify(cart));
    updateCartCount();
    showToast(name + ' added to cart');
  };

  // ============================================
  // TOAST NOTIFICATION
  // ============================================
  var toast = document.getElementById('toast');
  var toastMsg = document.getElementById('toastMsg');
  var toastTimeout = null;

  window.showToast = function(msg) {
    if (!toast || !toastMsg) return;
    toastMsg.textContent = msg;
    toast.classList.add('show');
    if (toastTimeout) clearTimeout(toastTimeout);
    toastTimeout = setTimeout(function() {
      toast.classList.remove('show');
    }, 3000);
  };

  // ============================================
  // SMOOTH SCROLL
  // ============================================
  document.querySelectorAll('a[href^="#"]').forEach(function(anchor) {
    anchor.addEventListener('click', function(e) {
      var href = this.getAttribute('href');
      if (href === '#') return;
      e.preventDefault();
      var target = document.querySelector(href);
      if (target) target.scrollIntoView({ behavior: 'smooth' });
    });
  });

  // ============================================
  // VISIBILITY API
  // ============================================
  document.addEventListener('visibilitychange', function() {
    var videos = document.querySelectorAll('video');
    videos.forEach(function(video) {
      if (document.hidden) {
        video.pause();
      } else {
        video.play().catch(function() {});
      }
    });
  });

})();
</script>

</body>
</html>
