<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EXAMPLE CLOTHING — Premium Fashion Store</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
:root{
  --ink:#0e0d0b;
  --ink-soft:#1c1a17;
  --ivory:#f7f4ee;
  --ivory-dim:#efeadf;
  --gold:#b08d3e;
  --gold-soft:#d4b878;
  --line:#e4ddcd;
  --line-dark:rgba(255,255,255,.12);
  --white:#ffffff;
  --ease:cubic-bezier(.22,1,.36,1);
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

html{
  scroll-behavior:smooth;
}

body{
  background:var(--ivory);
  color:var(--ink);
  font-family:'Inter',sans-serif;
  overflow-x:hidden;
  -webkit-font-smoothing:antialiased;
}

h1,h2,h3{
  font-family:'Cormorant Garamond',serif;
  font-weight:500;
}

a{
  color:inherit;
}

::selection{
  background:var(--gold);
  color:var(--white);
}

/* ---------- PRELOADER ---------- */

.preloader{
  position:fixed;
  inset:0;
  background:var(--ink);
  z-index:9999;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:18px;
  transition:opacity .8s var(--ease), visibility .8s;
}

.preloader.done{
  opacity:0;
  visibility:hidden;
}

.preloader .pl-logo{
  font-family:'Cormorant Garamond',serif;
  font-size:34px;
  letter-spacing:10px;
  color:var(--ivory);
  text-indent:10px;
  overflow:hidden;
}

.preloader .pl-logo span{
  display:inline-block;
  animation:plUp 1s var(--ease) both;
}

@keyframes plUp{
  from{transform:translateY(110%);}
  to{transform:translateY(0);}
}

.pl-line{
  width:120px;
  height:1px;
  background:rgba(255,255,255,.15);
  position:relative;
  overflow:hidden;
}

.pl-line::after{
  content:"";
  position:absolute;
  inset:0;
  background:var(--gold-soft);
  transform:translateX(-100%);
  animation:plLine 1.6s var(--ease) .2s forwards;
}

@keyframes plLine{
  to{transform:translateX(0);}
}

.pl-sub{
  font-size:10px;
  letter-spacing:4px;
  text-transform:uppercase;
  color:var(--gold-soft);
  opacity:0;
  animation:plFade .8s ease 1s forwards;
}

@keyframes plFade{
  to{opacity:1;}
}

/* ---------- HEADER ---------- */

.header{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:72px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:0 24px;
  z-index:1000;
  transition:background .5s var(--ease), border-color .5s, transform .45s var(--ease);
  background:transparent;
  border-bottom:1px solid transparent;
}

.header.solid{
  background:rgba(247,244,238,.9);
  backdrop-filter:blur(14px);
  -webkit-backdrop-filter:blur(14px);
  border-bottom:1px solid var(--line);
}

.header.hide{
  transform:translateY(-100%);
}

.header.on-hero .logo-text{
  color:var(--ivory);
}

.header.on-hero .icon-link svg{
  stroke:var(--ivory);
}

.header.on-hero .menu-btn span{
  background:var(--ivory);
}

/* Desktop Navigation styling */
.desktop-nav{
  display:none;
  align-items:center;
  gap:32px;
  list-style:none;
}

.desktop-nav a{
  text-decoration:none;
  font-size:11px;
  text-transform:uppercase;
  letter-spacing:2px;
  font-weight:500;
  color:var(--ink);
  transition:color .3s;
}

.header.on-hero .desktop-nav a{
  color:var(--ivory);
}

.desktop-nav a:hover,
.header.on-hero .desktop-nav a:hover{
  color:var(--gold);
}

.menu-btn{
  width:44px;
  height:44px;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:flex-start;
  gap:6px;
  cursor:pointer;
  background:none;
  border:none;
  padding:0 10px;
}

.menu-btn span{
  display:block;
  height:1.5px;
  background:var(--ink);
  border-radius:2px;
  transition:width .35s var(--ease), background .4s;
}

.menu-btn span:nth-child(1){width:24px;}
.menu-btn span:nth-child(2){width:16px;}
.menu-btn span:nth-child(3){width:20px;}

.menu-btn:hover span{width:24px;}

.logo-area{
  display:flex;
  align-items:center;
  gap:10px;
  margin-left:14px;
}

.logo{
  width:34px;
  height:34px;
  border-radius:50%;
  object-fit:cover;
}

.logo-text{
  font-family:'Cormorant Garamond',serif;
  font-size:21px;
  letter-spacing:4px;
  font-weight:500;
  transition:color .4s;
}

.header-icons{
  display:flex;
  align-items:center;
  gap:4px;
}

.icon-link{
  position:relative;
  width:42px;
  height:42px;
  display:flex;
  align-items:center;
  justify-content:center;
  text-decoration:none;
  border-radius:50%;
  transition:background .25s;
}

.icon-link:active{
  background:rgba(176,141,62,.15);
}

.icon-link svg{
  width:21px;
  height:21px;
  stroke:var(--ink);
  fill:none;
  stroke-width:1.4;
  transition:stroke .4s;
}

.badge{
  position:absolute;
  top:3px;
  right:3px;
  background:var(--gold);
  color:var(--white);
  min-width:16px;
  height:16px;
  padding:0 3px;
  border-radius:50%;
  font-size:10px;
  font-weight:700;
  display:flex;
  align-items:center;
  justify-content:center;
}

/* ---------- SIDE MENU ---------- */

.side-menu{
  position:fixed;
  top:0;
  left:0;
  width:min(320px,86%);
  height:100%;
  background:var(--ink);
  color:var(--ivory);
  padding:96px 36px 36px;
  transform:translateX(-102%);
  transition:transform .6s var(--ease);
  z-index:2000;
  display:flex;
  flex-direction:column;
}

.side-menu.open{
  transform:translateX(0);
}

.menu-tag{
  font-size:10px;
  letter-spacing:4px;
  text-transform:uppercase;
  color:var(--gold-soft);
  margin-bottom:22px;
  display:block;
}

.side-menu a.nav-link{
  display:block;
  text-decoration:none;
  color:var(--ivory);
  font-family:'Cormorant Garamond',serif;
  font-size:27px;
  padding:12px 0;
  border-bottom:1px solid var(--line-dark);
  opacity:0;
  transform:translateY(24px);
  transition:opacity .6s var(--ease), transform .6s var(--ease), padding-left .35s, color .3s;
}

.side-menu.open a.nav-link{
  opacity:1;
  transform:translateY(0);
}

.side-menu.open a.nav-link:nth-of-type(1){transition-delay:.10s;}
.side-menu.open a.nav-link:nth-of-type(2){transition-delay:.16s;}
.side-menu.open a.nav-link:nth-of-type(3){transition-delay:.22s;}
.side-menu.open a.nav-link:nth-of-type(4){transition-delay:.28s;}
.side-menu.open a.nav-link:nth-of-type(5){transition-delay:.34s;}
.side-menu.open a.nav-link:nth-of-type(6){transition-delay:.40s;}
.side-menu.open a.nav-link:nth-of-type(7){transition-delay:.46s;}

.side-menu a.nav-link:hover{
  padding-left:10px;
  color:var(--gold-soft);
}

.menu-foot{
  margin-top:auto;
  font-size:11px;
  letter-spacing:2px;
  text-transform:uppercase;
  color:rgba(247,244,238,.4);
}

.close-btn{
  position:absolute;
  top:22px;
  right:22px;
  width:44px;
  height:44px;
  background:none;
  border:1px solid var(--line-dark);
  border-radius:50%;
  color:var(--ivory);
  font-size:18px;
  cursor:pointer;
  line-height:1;
  transition:background .3s, transform .4s var(--ease);
}

.close-btn:hover{
  background:rgba(255,255,255,.08);
  transform:rotate(90deg);
}

.menu-overlay{
  position:fixed;
  inset:0;
  background:rgba(10,9,8,.55);
  backdrop-filter:blur(3px);
  z-index:1500;
  opacity:0;
  visibility:hidden;
  transition:opacity .5s, visibility .5s;
}

.menu-overlay.open{
  opacity:1;
  visibility:visible;
}

/* ---------- HERO ---------- */

.hero{
  height:100svh;
  position:relative;
  overflow:hidden;
  background:var(--ink);
}

.hero video{
  width:100%;
  height:100%;
  object-fit:cover;
  transform:scale(1.08);
  animation:heroZoom 7s var(--ease) forwards;
}

@keyframes heroZoom{
  to{transform:scale(1);}
}

.overlay{
  position:absolute;
  inset:0;
  background:linear-gradient(180deg,rgba(14,13,11,.25) 0%,rgba(14,13,11,.05) 40%,rgba(14,13,11,.72) 100%);
  display:flex;
  flex-direction:column;
  justify-content:flex-end;
  padding:0 26px 84px;
}

@media (min-width: 768px) {
  .overlay {
    padding: 0 80px 100px;
  }
}

.eyebrow{
  color:var(--gold-soft);
  font-size:11px;
  letter-spacing:5px;
  text-transform:uppercase;
  margin-bottom:18px;
  font-weight:600;
  display:flex;
  align-items:center;
  gap:12px;
}

.eyebrow::before{
  content:"";
  width:34px;
  height:1px;
  background:var(--gold-soft);
  transform:scaleX(0);
  transform-origin:left;
  animation:growLine 1.2s var(--ease) 1.5s forwards;
}

@keyframes growLine{
  to{transform:scaleX(1);}
}

.overlay h1{
  color:var(--ivory);
  font-size:clamp(42px,11vw,64px);
  line-height:1.04;
  max-width:550px;
  font-weight:500;
}

.overlay h1 em{
  font-style:italic;
  color:var(--gold-soft);
}

.overlay h1 .line{
  display:block;
  overflow:hidden;
}

.overlay h1 .line span{
  display:inline-block;
  transform:translateY(110%);
  animation:lineUp 1.1s var(--ease) forwards;
}

.overlay h1 .line:nth-child(1) span{animation-delay:1.2s;}
.overlay h1 .line:nth-child(2) span{animation-delay:1.35s;}
.overlay h1 .line:nth-child(3) span{animation-delay:1.5s;}

@keyframes lineUp{
  to{transform:translateY(0);}
}

.overlay p{
  color:rgba(247,244,238,.78);
  font-size:15px;
  margin-top:18px;
  max-width:480px;
  line-height:1.65;
  font-weight:300;
  opacity:0;
  animation:fadeUp 1s var(--ease) 2s forwards;
}

@keyframes fadeUp{
  from{opacity:0;transform:translateY(18px);}
  to{opacity:1;transform:translateY(0);}
}

.btn-row{
  display:flex;
  flex-direction:column;
  gap:12px;
  margin-top:30px;
  max-width:300px;
  opacity:0;
  animation:fadeUp 1s var(--ease) 2.25s forwards;
}

@media(min-width: 576px) {
  .btn-row {
    flex-direction: row;
    max-width: none;
  }
}

.btn{
  position:relative;
  padding:17px 24px;
  text-decoration:none;
  font-weight:600;
  font-size:12px;
  letter-spacing:2.5px;
  text-transform:uppercase;
  text-align:center;
  border:1px solid transparent;
  overflow:hidden;
  transition:color .4s var(--ease);
  z-index:1;
}

.btn::after{
  content:"";
  position:absolute;
  inset:0;
  z-index:-1;
  transform:scaleX(0);
  transform-origin:right;
  transition:transform .5s var(--ease);
}

.btn:hover::after{
  transform:scaleX(1);
  transform-origin:left;
}

.btn-primary{
  background:var(--ivory);
  color:var(--ink);
}

.btn-primary::after{
  background:var(--gold);
}

.btn-primary:hover{
  color:var(--white);
}

.btn-outline{
  background:transparent;
  color:var(--ivory);
  border:1px solid rgba(247,244,238,.45);
}

.btn-outline::after{
  background:var(--ivory);
}

.btn-outline:hover{
  color:var(--ink);
}

.scroll-hint{
  position:absolute;
  bottom:26px;
  left:50%;
  transform:translateX(-50%);
  width:1px;
  height:40px;
  background:rgba(247,244,238,.25);
  overflow:hidden;
}

.scroll-hint::after{
  content:"";
  position:absolute;
  top:-40px;
  left:0;
  width:100%;
  height:40px;
  background:var(--gold-soft);
  animation:scrollDrop 1.8s var(--ease) infinite;
}

@keyframes scrollDrop{
  0%{top:-40px;}
  60%,100%{top:40px;}
}

/* ---------- MARQUEE STRIP ---------- */

.marquee{
  background:var(--ink);
  color:var(--ivory);
  padding:18px 0;
  overflow:hidden;
  position:relative;
}

.marquee-track{
  display:flex;
  width:max-content;
  animation:marquee 22s linear infinite;
}

@keyframes marquee{
  to{transform:translateX(-50%);}
}

.marquee .txt{
  font-size:11px;
  letter-spacing:3px;
  text-transform:uppercase;
  color:var(--gold-soft);
  font-weight:600;
  padding:0 28px;
  display:flex;
  align-items:center;
  gap:28px;
  white-space:nowrap;
}

.marquee .txt::after{
  content:"◆";
  font-size:7px;
  color:rgba(247,244,238,.35);
}

/* ---------- REVEAL ON SCROLL ---------- */

.reveal{
  opacity:0;
  transform:translateY(36px);
  transition:opacity .9s var(--ease), transform .9s var(--ease);
}

.reveal.in{
  opacity:1;
  transform:translateY(0);
}

/* ---------- SECTION HEADINGS ---------- */

.section-head{
  padding:64px 26px 10px;
  text-align:center;
}

.section-head .eyebrow-dark{
  font-size:10px;
  letter-spacing:4px;
  text-transform:uppercase;
  color:var(--gold);
  font-weight:700;
  display:inline-flex;
  align-items:center;
  gap:12px;
}

.section-head .eyebrow-dark::before,
.section-head .eyebrow-dark::after{
  content:"";
  width:26px;
  height:1px;
  background:var(--gold);
  opacity:.5;
}

.section-head h2{
  font-size:36px;
  margin-top:12px;
  font-weight:500;
}

.section-head .lede{
  margin-top:10px;
  font-size:14px;
  color:rgba(14,13,11,.55);
  font-weight:300;
  max-width:380px;
  margin-left:auto;
  margin-right:auto;
  line-height:1.6;
}

/* ---------- FEATURED SHOWCASE ---------- */

.featured-grid{
  display:grid;
  grid-template-columns:1fr;
  gap:24px;
  padding:0 22px;
  max-width:1200px;
  margin:28px auto 0;
}

.featured-card{
  background:var(--white);
  border:1px solid var(--line);
  position:relative;
}

.tag-badge{
  position:absolute;
  top:16px;
  left:16px;
  background:rgba(14,13,11,.85);
  backdrop-filter:blur(6px);
  color:var(--ivory);
  font-size:9px;
  letter-spacing:2px;
  text-transform:uppercase;
  padding:8px 12px;
  font-weight:700;
  z-index:2;
  display:flex;
  align-items:center;
  gap:6px;
}

.tag-badge svg{
  width:11px;
  height:11px;
  stroke:var(--gold-soft);
  fill:none;
  stroke-width:2;
}

.media-wrap{
  overflow:hidden;
  position:relative;
}

.featured-card video,
.featured-card img{
  width:100%;
  display:block;
  aspect-ratio:4/5;
  object-fit:cover;
  transition:transform 1.2s var(--ease);
}

.featured-card:hover video,
.featured-card:hover img{
  transform:scale(1.05);
}

.featured-content{
  padding:24px 22px 22px;
  text-align:center;
}

.featured-content h3{
  font-size:23px;
  line-height:1.25;
  font-weight:500;
}

.price-row{
  display:flex;
  align-items:baseline;
  justify-content:center;
  gap:8px;
  margin:10px 0 20px;
}

.price{
  font-size:20px;
  font-weight:600;
  font-family:'Cormorant Garamond',serif;
  letter-spacing:1px;
}

.view-btn{
  position:relative;
  display:block;
  text-align:center;
  background:var(--ink);
  color:var(--ivory);
  text-decoration:none;
  padding:16px;
  font-size:11px;
  font-weight:600;
  letter-spacing:2.5px;
  text-transform:uppercase;
  overflow:hidden;
  z-index:1;
}

.view-btn::after{
  content:"";
  position:absolute;
  inset:0;
  background:var(--gold);
  z-index:-1;
  transform:translateY(101%);
  transition:transform .45s var(--ease);
}

.view-btn:hover::after{
  transform:translateY(0);
}

/* ---------- CRAFT / VALUES ---------- */

.craft{
  margin-top:70px;
  background:var(--ink);
  color:var(--ivory);
  padding:70px 30px;
  text-align:center;
  position:relative;
  overflow:hidden;
}

.craft::before{
  content:"E";
  position:absolute;
  font-family:'Cormorant Garamond',serif;
  font-size:420px;
  line-height:1;
  color:rgba(255,255,255,.03);
  top:-60px;
  right:-70px;
  pointer-events:none;
}

.craft .eyebrow-dark{
  font-size:10px;
  letter-spacing:4px;
  text-transform:uppercase;
  color:var(--gold-soft);
  font-weight:700;
}

.craft h2{
  font-size:32px;
  margin:14px auto 0;
  max-width:320px;
  line-height:1.2;
}

.craft h2 em{
  font-style:italic;
  color:var(--gold-soft);
}

.craft-grid{
  margin-top:44px;
  display:grid;
  gap:36px;
}

.craft-item .num{
  font-family:'Cormorant Garamond',serif;
  font-size:15px;
  color:var(--gold-soft);
  letter-spacing:2px;
}

.craft-item h3{
  font-size:21px;
  margin-top:8px;
}

.craft-item p{
  margin-top:8px;
  font-size:13px;
  line-height:1.7;
  color:rgba(247,244,238,.6);
  font-weight:300;
  max-width:280px;
  margin-left:auto;
  margin-right:auto;
}

/* ---------- CATEGORIES ---------- */

.categories{
  padding:0 22px;
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:10px;
  margin-top:28px;
}

.cat{
  position:relative;
  background:var(--white);
  border:1px solid var(--line);
  text-align:center;
  padding:40px 10px;
  font-family:'Cormorant Garamond',serif;
  font-size:20px;
  letter-spacing:1px;
  text-decoration:none;
  color:var(--ink);
  transition:background .4s var(--ease), color .4s var(--ease), border-color .4s;
  overflow:hidden;
}

.cat small{
  display:block;
  font-family:'Inter',sans-serif;
  font-size:9px;
  letter-spacing:2.5px;
  text-transform:uppercase;
  color:var(--gold);
  margin-top:6px;
  transition:color .4s;
}

.cat:hover{
  background:var(--ink);
  color:var(--ivory);
  border-color:var(--ink);
}

.cat:hover small{
  color:var(--gold-soft);
}

/* ---------- FOOTER ---------- */

footer{
  background:var(--ink);
  color:var(--ivory);
  padding:70px 26px 34px;
  text-align:center;
  margin-top:70px;
}

footer .foot-logo{
  font-family:'Cormorant Garamond',serif;
  font-size:26px;
  letter-spacing:6px;
  text-indent:6px;
}

footer .foot-tag{
  font-size:10px;
  letter-spacing:3px;
  text-transform:uppercase;
  color:var(--gold-soft);
  margin-top:10px;
}

footer h2{
  font-size:22px;
  margin:40px 0 24px;
  color:var(--ivory);
}

footer p{
  margin:16px 0;
  font-size:14px;
  line-height:1.6;
  color:rgba(247,244,238,.65);
  font-weight:300;
}

footer p b{
  color:var(--gold-soft);
  display:block;
  font-weight:600;
  font-size:10px;
  letter-spacing:2.5px;
  text-transform:uppercase;
  margin-bottom:5px;
}

footer hr{
  margin:36px 0 26px;
  border:none;
  border-top:1px solid var(--line-dark);
}

.copyright{
  color:rgba(247,244,238,.35);
  font-size:11px;
  letter-spacing:1px;
}

/* ---------- RESPONSIVE ADAPTATIONS ---------- */

@media(min-width: 768px) {
  .desktop-nav {
    display: flex;
  }
  .logo-area {
    margin-left: 0;
  }
  .featured-grid {
    grid-template-columns: repeat(2, 1fr);
    gap: 30px;
  }
  .craft-grid {
    grid-template-columns: repeat(3, 1fr);
    max-width: 1100px;
    margin-left: auto;
    margin-right: auto;
    gap: 20px;
  }
  .categories {
