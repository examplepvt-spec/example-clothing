<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EXAMPLE | Premium Fashion</title>
  
  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">

  <style>
    /* Reset & Base Styles */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      background-color: #0c0a09;
      color: #f5f5f4;
      font-family: 'Montserrat', sans-serif;
      overflow-x: hidden;
      min-height: 100vh;
    }

    /* ==========================================
       1. PRELOADER STYLING (FIXED VERSION)
       ========================================== */
    .preloader {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-color: #0c0a09; /* Matches background */
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 9999;
      opacity: 1;
      visibility: visible;
      transition: opacity 0.8s ease, visibility 0.8s ease;
    }

    /* Fixed class: ensures clickability passes through and hides elements */
    .preloader.done {
      opacity: 0;
      visibility: hidden;
      pointer-events: none; /* Prevents preloader from blocking touch/click actions */
    }

    /* Preloader Content matching your screenshot */
    .preloader-content {
      text-align: center;
    }
    
    .preloader-title {
      font-family: 'Cinzel', serif;
      font-size: 2.5rem;
      color: #ffffff;
      letter-spacing: 0.4em;
      text-transform: uppercase;
      margin-bottom: 20px;
      padding-left: 0.4em; /* Offsets letter-spacing to center properly */
    }

    .preloader-divider {
      width: 120px;
      height: 1px;
      background-color: #c5a880; /* Gold/Bronze divider line */
      margin: 0 auto 20px auto;
    }

    .preloader-subtitle {
      font-size: 0.75rem;
      color: #c5a880; /* Gold/Bronze subtitle */
      letter-spacing: 0.5em;
      text-transform: uppercase;
      padding-left: 0.5em;
    }

    /* ==========================================
       2. WEBSITE HEADER & NAVIGATION
       ========================================== */
    header {
      padding: 30px 5%;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid rgba(197, 168, 128, 0.1);
    }

    .logo {
      font-family: 'Cinzel', serif;
      font-size: 1.5rem;
      color: #ffffff;
      text-decoration: none;
      letter-spacing: 0.2em;
    }

    nav {
      display: flex;
      gap: 30px;
    }

    nav a {
      color: #d6d3d1;
      text-decoration: none;
      font-size: 0.85rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      transition: color 0.3s ease;
    }

    nav a:hover {
      color: #c5a880;
    }

    /* ==========================================
       3. HERO SECTION
       ========================================== */
    .hero {
      min-height: calc(100vh - 100px);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 40px;
    }

    .hero h1 {
      font-family: 'Cinzel', serif;
      font-size: 3rem;
      letter-spacing: 0.2em;
      margin-bottom: 20px;
    }

    .hero p {
      font-size: 1rem;
      color: #a8a29e;
      max-width: 600px;
      margin-bottom: 40px;
      line-height: 1.6;
    }

    .btn {
      display: inline-block;
      padding: 15px 40px;
      border: 1px solid #c5a880;
      color: #c5a880;
      text-decoration: none;
      text-transform: uppercase;
      font-size: 0.8rem;
      letter-spacing: 0.2em;
      transition: all 0.3s ease;
    }

    .btn:hover {
      background-color: #c5a880;
      color: #0c0a09;
    }

    /* Responsive styles */
    @media (max-width: 768px) {
      .preloader-title {
        font-size: 1.8rem;
      }
      .hero h1 {
        font-size: 2rem;
      }
      nav {
        display: none; /* Can be expanded to a mobile menu later */
      }
    }
  </style>
</head>
<body>

  <!-- FIXED PRELOADER ELEMENT -->
  <div class="preloader" id="preloader">
    <div class="preloader-content">
      <h1 class="preloader-title">Example</h1>
      <div class="preloader-divider"></div>
      <p class="preloader-subtitle">Premium Fashion</p>
    </div>
  </div>

  <!-- WEBSITE CONTENT -->
  <header>
    <a href="#" class="logo">E X A M P L E</a>
    <nav>
      <a href="#">Home</a>
      <a href="#">Collection</a>
      <a href="#">About</a>
      <a href="#">Contact</a>
    </nav>
  </header>

  <main>
    <section class="hero">
      <h1>NEW COLLECTION</h1>
      <p>Minimalist, premium craftsmanship designed for modern elegance. Explore our curated high-fashion silhouettes.</p>
      <a href="#" class="btn">Explore Now</a>
    </section>
  </main>

  <!-- ==========================================
       4. ROBUST PRELOADER CONTROLLER SCRIPT
       ========================================== */ -->
  <script>
    (function() {
      const preloader = document.getElementById("preloader");
      if (!preloader) return;

      let isPreloaderHidden = false;

      // Function to trigger fade out safely
      const hidePreloader = () => {
        if (isPreloaderHidden) return;
        isPreloaderHidden = true;
        preloader.classList.add("done");
        
        // Fully remove preloader element from layout after the animation ends
        setTimeout(() => {
          preloader.style.display = "none";
        }, 800); // matches transition time
      };

      // 1. Hide as soon as HTML is loaded (much faster than waiting for images)
      document.addEventListener("DOMContentLoaded", hidePreloader);

      // 2. Hide when all assets are loaded (fallback)
      window.addEventListener("load", hidePreloader);

      // 3. Absolute fail-safe fallback: Force preloader to hide after 2.5 seconds
      // regardless of asset issues, script errors, or slow internet
      setTimeout(hidePreloader, 2500);
    })();
  </script>

</body>
</html>
