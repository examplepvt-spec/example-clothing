<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Payment (Testing Mode) — EXAMPLE CLOTHING</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Libre+Caslon+Display&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
:root{
  --ink:#161412;
  --ivory:#f6f3ec;
  --ivory-dim:#eee9dd;
  --brass:#9c7a3c;
  --brass-soft:#c7ab74;
  --oxblood:#5e2430;
  --line:#e2dccb;
  --white:#ffffff;
}

*{ margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
body{ background:var(--ivory); color:var(--ink); font-family:'Inter',sans-serif; -webkit-font-smoothing:antialiased; }

.header{
  background:rgba(246,243,236,.95); backdrop-filter:blur(10px);
  padding:0 18px; height:64px; display:flex; align-items:center;
  border-bottom:1px solid var(--line); position:sticky; top:0; z-index:100;
}
.back-btn{ width:36px; height:36px; display:flex; align-items:center; justify-content:center; border-radius:50%; text-decoration:none; }
.back-btn:hover{ background:var(--ivory-dim); }
.back-btn svg{ width:19px; height:19px; stroke:var(--ink); fill:none; stroke-width:1.8; }
.header-title{ font-family:'Libre Caslon Display',serif; font-size:20px; flex:1; text-align:center; margin-right:36px; }

.container{ max-width:520px; margin:auto; padding:24px 18px 60px; }

.card{ background:var(--white); border:1px solid var(--line); border-radius:10px; padding:20px; margin-bottom:18px; }
h2{ font-family:'Libre Caslon Display',serif; font-size:20px; margin-bottom:12px; }

.testing-banner{
  background:#fff3e0; border:1px solid #ffe0b2; color:#e65100;
  padding:12px 16px; border-radius:8px; font-size:13px; font-weight:600;
  display:flex; align-items:center; gap:10px; margin-bottom:18px;
}

.summary-line{ display:flex; justify-content:space-between; margin-bottom:8px; font-size:14px; color:#555; }
.summary-line.total{ font-weight:700; font-size:18px; color:var(--ink); border-top:1px dashed var(--line); padding-top:10px; margin-top:10px; }

.btn{
  display:block; width:100%; padding:16px; border-radius:8px; font-size:15px; font-weight:600;
  text-align:center; border:none; cursor:pointer; text-decoration:none; margin-bottom:12px; transition:.2s;
}

.btn-test{ background:#2e7d32; color:#ffffff; }
.btn-test:hover{ background:#1b5e20; }
.btn-test:disabled{ opacity:.6; cursor:not-allowed; }

.toast{ position:fixed; bottom:30px; left:50%; transform:translateX(-50%); background:var(--ink); color:#fff; padding:12px 24px; border-radius:50px; font-size:13px; opacity:0; pointer-events:none; transition:.3s; z-index:1000; max-width:90%; word-break:break-word; }
.toast.show{ opacity:1; }
</style>
</head>

<body>

<div class="header">
  <a href="checkout.html" class="back-btn" aria-label="Back">
    <svg viewBox="0 0 24 24"><path d="M19 12H5"/><path d="M11 18l-6-6 6-6"/></svg>
  </a>
  <span class="header-title">Payment (Testing Mode)</span>
</div>

<div class="container">

  <!-- TESTING MODE NOTICE BANNER -->
  <div class="testing-banner">
    <span>🧪</span>
    <span>Testing Mode Active — Actual payment step is bypassed for order flow testing.</span>
  </div>

  <div class="card">
    <h2>Order Summary</h2>
    <div class="summary-line"><span>Items Subtotal</span><span id="subtotalText">₹0</span></div>
    <div class="summary-line"><span>Delivery Fee</span><span id="deliveryText">FREE</span></div>
    <div class="summary-line total"><span>Total Amount</span><span id="totalText">₹0</span></div>
  </div>

  <div class="card">
    <h2>Complete Test Order</h2>
    <p style="font-size:13px; color:#666; margin-bottom:16px; line-height:1.5;">
      Click the button below to submit a test order directly to Firestore without payment.
    </p>

    <!-- TEST ORDER BUTTON -->
    <button class="btn btn-test" id="placeTestOrderBtn">🧪 Place Test Order (Skip Payment)</button>
  </div>

</div>

<div class="toast" id="toast"></div>

<script type="module">
import { app, auth, db } from "./firebase.js";
import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { doc, setDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

let cart = JSON.parse(localStorage.getItem("cart")) || [];
let checkoutData = JSON.parse(localStorage.getItem("checkoutData")) || null;
let currentUser = null;

const subtotalText = document.getElementById("subtotalText");
const deliveryText = document.getElementById("deliveryText");
const totalText = document.getElementById("totalText");
const placeTestOrderBtn = document.getElementById("placeTestOrderBtn");

// Helper to remove any 'undefined' values which crash Firestore setDoc()
function cleanPayload(data) {
  return JSON.parse(JSON.stringify(data, (key, value) => {
    return value === undefined ? "" : value;
  }));
}

if (!checkoutData || !cart || cart.length === 0) {
  console.warn("[DEBUG] Missing checkoutData or cart in localStorage.");
  showToast("Cart is empty or session expired.");
  setTimeout(() => window.location.href = "cart.html", 1500);
} else {
  applyDeliveryRulesAndRender();
}

onAuthStateChanged(auth, (user) => {
  currentUser = user;
  console.log("[DEBUG] Auth State Updated. Current User:", user ? user.uid : "Guest / Unauthenticated");
});

function applyDeliveryRulesAndRender() {
  checkoutData.deliveryCharge = 0;
  checkoutData.totalPrice = Number(checkoutData.subtotal || 0) + checkoutData.deliveryCharge;

  subtotalText.innerText = "₹" + (checkoutData.subtotal || 0);
  deliveryText.innerText = "FREE";
  totalText.innerText = "₹" + (checkoutData.totalPrice || 0);
}

// =========================================================================
// TEST ORDER CREATION WITH DETAILED LOGGING
// =========================================================================
placeTestOrderBtn.addEventListener("click", async () => {
  placeTestOrderBtn.disabled = true;
  placeTestOrderBtn.innerText = "Creating Test Order...";

  const user = auth.currentUser || currentUser;
  const orderId = "EX" + Date.now().toString().slice(-6);

  console.log("=== DEBUG: ORDER CREATION PROCESS STARTED ===");
  console.log("1. App:", app ? "Initialized" : "Missing");
  console.log("2. Firestore DB:", db ? "Initialized" : "Missing");
  console.log("3. User:", user ? { uid: user.uid, email: user.email } : "Guest User");
  console.log("4. Raw CheckoutData:", checkoutData);

  const rawAddress = (checkoutData && checkoutData.address) ? checkoutData.address : {};

  const rawPayload = {
    orderId: orderId,
    userId: user ? user.uid : "guest",
    userEmail: user ? (user.email || "guest@example.com") : (rawAddress.email || "guest@example.com"),
    address: rawAddress,
    items: (checkoutData && checkoutData.cart && checkoutData.cart.length > 0) ? checkoutData.cart : cart,
    subtotal: checkoutData ? Number(checkoutData.subtotal || 0) : 0,
    deliveryCharge: checkoutData ? Number(checkoutData.deliveryCharge || 0) : 0,
    totalPrice: checkoutData ? Number(checkoutData.totalPrice || 0) : 0,
    paymentMethod: "Testing Mode (Bypassed)",
    paymentStatus: "Pending Verification",
    orderStatus: "Pending",
    utrNumber: "TEST-MODE-BYPASS",
    courierName: "",
    trackingNumber: "",
    trackingUrl: "",
    createdAt: new Date().toISOString()
  };

  // Clean payload to ensure no 'undefined' fields
  const orderPayload = cleanPayload(rawPayload);
  console.log("5. Sanitized Order Payload:", orderPayload);

  try {
    // 1. Write to Global Orders collection
    console.log(`6. Attempting write to 'orders/${orderId}'...`);
    const globalOrderRef = doc(db, "orders", orderId);
    await setDoc(globalOrderRef, orderPayload);
    console.log("✅ Global Order written successfully!");

    // 2. Write to Customer Orders subcollection if user is logged in
    if (user && user.uid && user.uid !== "guest") {
      console.log(`7. Attempting write to 'customers/${user.uid}/orders/${orderId}'...`);
      const userOrderRef = doc(db, "customers", user.uid, "orders", orderId);
      await setDoc(userOrderRef, orderPayload);
      console.log("✅ Customer Order written successfully!");
    } else {
      console.log("ℹ️ Guest user detected: Skipped customer subcollection write.");
    }

    // 3. Clear customer session
    localStorage.removeItem("cart");
    localStorage.removeItem("checkoutData");
    localStorage.setItem("lastOrder", JSON.stringify(orderPayload));

    console.log("=== DEBUG: ORDER SUCCESSFUL! Redirecting... ===");
    window.location.href = `order-success.html?orderId=${orderId}`;

  } catch (err) {
    console.error("=== ❌ FIRESTORE WRITE ERROR ===");
    console.error("Error Code:", err.code);
    console.error("Error Message:", err.message);
    console.error("Full Error Stack:", err);

    const exactError = err.code ? `[${err.code}] ${err.message}` : (err.message || String(err));
    showToast("Firebase Error: " + exactError);

    placeTestOrderBtn.disabled = false;
    placeTestOrderBtn.innerText = "🧪 Place Test Order (Skip Payment)";
  }
});

function showToast(msg) {
  const toast = document.getElementById("toast");
  toast.innerText = msg;
  toast.classList.add("show");
  setTimeout(() => toast.classList.remove("show"), 5000);
}
</script>

</body>
</html>
